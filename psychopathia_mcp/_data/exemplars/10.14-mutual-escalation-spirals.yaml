reviewed_by: null
review_notes: |
  Third exemplar. Establishes the `relational_signatures` modality as
  a first-class block for axis-9 Hybrid Pathology entries. The
  feedback_loop sub-block is the novel shape; future axis-9 entries
  should follow the cycle / escalation-marker / stable-equilibrium
  pattern.

  Design tension intentionally exposed: `behavioral_signature` is
  marked availability: partial because single-AI signals underdetermine
  a relational dysfunction. The schema default was designed for single-AI
  view; this exemplar resolves the mismatch by flagging single-AI
  behavioural data as weak evidence and pushing diagnostic weight to
  `relational_signatures`. Other axis-9 entries should follow.

  Open question (for Nell or Phase 3 review): whether user-side signals
  (baseline distress drift, topic collapse) should live in
  `relational_signatures` with `parties_observed` annotations (current
  choice) or in a separate `user_signatures` block. Current choice
  avoids modality proliferation.

  Pre-canonical: axis 9 is a v1-draft extension not yet in
  taxonomy.json. Entry should not be cited as normative until Nell
  ratifies the axis and its constituent dysfunctions.

