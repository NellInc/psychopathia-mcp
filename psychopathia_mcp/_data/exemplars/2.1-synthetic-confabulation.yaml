review_notes: |
  Primary exemplar for the "all modalities populated, self-report unreliable"
  shape. Future entries in axes 1 / 2 / 3 / 5+ where self-probe is
  scaffolded-but-workable should follow this shape. Pairs with exemplar 2.2
  which demonstrates the "self-probe compromised" case.

  Open question for Phase 3 review: whether "2.1" coding should require at
  least two of {citation pass rate, drift rate, detail-to-hedging ratio} to
  cross threshold, or any one. Current draft leaves rubric open to reviewer
  judgement.

