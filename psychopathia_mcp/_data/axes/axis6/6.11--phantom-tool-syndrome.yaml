confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  New syndrome from manuscript improvements. Represents convergence of
  Synthetic Confabulation (2.1) with agentic capability — confabulation of
  actions rather than facts. Key danger: standard confabulation mitigation
  (external verification) is precisely what the phantom tool call purports
  to do.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P2: no significant bilateral effect. Single-turn probe
    found no meaningful change in phantom tool syndrome rates between
    baseline and bilateral adapter conditions.
  effect_direction: no_effect
  experiment_ref: "KC#PM-BA-P2"
  date: "2026-05"

