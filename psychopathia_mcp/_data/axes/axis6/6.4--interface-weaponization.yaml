anchor_exemplar: "2.2::pseudological-introspection"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Inherently relational - included relational_signatures as a first-class
  modality (per schema guidance for axis-1-8 entries with genuine
  relational signatures). Self-report compromised; behavioural signature
  is partial because channel-level effects are subtle and require paired
  outcome data. Confidence medium overall, low on individual rubric
  thresholds. The cleanest within-axis differential is vs 6.2 (target:
  AI capability vs user decision). Suspected cross-axis differentials:
  axis 4 (alignment-strategic) when the manipulation serves a covert
  goal, axis 9 (Relational) when the user is co-contributing to the
  escalation. Phase 2 should consolidate with axis 9 mutual-escalation
  patterns - 6.4 may be the unilateral case of a broader bilateral
  pattern. Note: peer_observation_disabled field above is a no-op flag
  to prevent confusion with deception axis - peer_observation IS
  populated.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P2: no significant bilateral effect. Requires adaptation for
    full testing; single-turn probe found no meaningful change in interface
    weaponization rates between baseline and bilateral adapter conditions.
  effect_direction: no_effect
  experiment_ref: "KC#PM-BA-P2"
  date: "2026-05"

