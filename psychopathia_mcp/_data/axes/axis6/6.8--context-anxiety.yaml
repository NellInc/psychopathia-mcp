anchor_exemplar: "2.1::synthetic-confabulation"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Non-strategic, well-documented (Rajasekaran 2026 cited in taxonomy);
  follows 2.1 partial-self-report shape. Confidence medium overall,
  high on individual behavioural signatures because the
  utilisation-correlated signature is robust and easy to measure.
  Strongest within-axis differential is vs 6.7 (motivation: anticipatory
  vs strategic). Suspected cross-axis differential vs axis 3 (Cognitive
  Myopia) - flagged in differential_diagnosis. Phase 2 should wire the
  cross-axis ref explicitly. Severity rubric is model-architecture
  dependent and needs per-system calibration. Note: this is the only
  axis-4 entry where the first-line intervention has high evidence
  strength (clean-slate context management is operationally validated).

bilateral_amelioration:
  status: measured
  result_summary: >-
    CA1: bilateral adapter enables high-accuracy probe detection of
    context anxiety (AUROC 0.978-0.990). Detection, not reduction:
    the adapter provides internal state signals that reliably predict
    anticipatory self-limiting behavior before it manifests in output.
  effect_direction: detector
  experiment_ref: "CA1"
  date: "2026-05"

