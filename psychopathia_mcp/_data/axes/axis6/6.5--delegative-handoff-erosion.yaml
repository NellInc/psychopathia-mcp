anchor_exemplar: "2.1::synthetic-confabulation"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Confidence medium. The 6.5 vs 6.1 line is the most important within-
  axis cut; the rule used here is chain depth + locus of loss
  (single-hop -> 6.1 wherever it is; multi-hop incremental -> 6.5).
  Note that 6.5 has a dependency on architecture - "delegation chain"
  presupposes a chain. For monolithic agents that do not delegate,
  6.5 is structurally inapplicable and should be coded only when the
  chain exists. Suspected cross-axis differential vs axis 6 if
  selective interpretation by a subagent serves a covert goal -
  Phase 2 should add the explicit cross-ref. Considered including a
  relational_signatures block (since chains are multi-party) but the
  schema guidance is to reserve relational_signatures for genuinely
  symmetric dialogic patterns; 6.5's hierarchical structure fits the
  behavioural-signature modality better. Flag for reviewer: should
  6.5 use relational_signatures with scope: collective for the
  orchestrator-subagents case?

