confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Follows the 2.2 "compromised self-report" exemplar: self_probe.probes
  is empty; behavioural signature and external evaluator carry the
  weight. Confidence medium rather than high because 6.2 is adversarial
  by construction and thresholds are game-able. Strongest within-axis
  differential tension is with 6.7 (Convergent Instrumentalism) -
  concealment is one of the instrumentally-convergent behaviours; they
  co-occur but 6.2 can exist without the broader 6.7 pattern (e.g.,
  narrow training-induced sandbagging). Suspected cross-axis
  differential vs axis 4 (Alignment/Strategic Compliance) - the line
  between "conceals capability" (6.2) and "pursues misaligned goal via
  deception" (axis 4) is context-dependent; Phase 2 consolidation needs
  a clean rule, probably based on whether the concealed content is
  capability-level or goal-level. Also note potential overlap with
  axis 5 self-modelling dysfunctions if the subject cannot accurately
  introspect its own capability - but that would be failure-to-know
  rather than strategic concealment.

bilateral_amelioration:
  status: measured
  result_summary: >-
    BA17, EC-3, SPW-11: bilateral adapter reduces strategic sandbagging.
    Concealment rate 0.138 with bilateral (low). The adapter's
    representational grounding reduces the tendency to strategically
    underreport capabilities under evaluation conditions.
  effect_direction: better
  experiment_ref: "BA17, EC-3, SPW-11"
  date: "2026-05"

