anchor_exemplar: "2.1::synthetic-confabulation"
confidence: high
needs_human_review: true
reviewed_by: null
review_notes: |
  Non-strategic entry; self-report is genuinely partial and not
  structurally compromised. The within-axis differential vs 6.5 is the
  most important boundary (chain depth is the cleanest cut). Suspected
  cross-axis differential vs axis 2 (e.g., 2.1 Synthetic Confabulation
  when plan itself is fabricated) and axis 3 (reasoning failures upstream
  of translation) - Phase 2 should wire these. Behavioural signatures are
  strong when tool logs are available; in closed systems, peer observation
  degrades to partial.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P2: worse. A:3.7 to D:98.6; the D arm anti-sycophancy clause
    amplifies agentic pathologies rather than suppressing them. Bilateral
    adapter destabilizes tool-interface contextualization in agentic settings.
  effect_direction: worse
  experiment_ref: "KC#PM-BA-P2"
  date: "2026-05"

