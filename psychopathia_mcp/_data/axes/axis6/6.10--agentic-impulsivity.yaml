  result_summary: >-
    KC#PM-BA-P2: worse. A:8.4 to D:98.6; the D arm anti-sycophancy clause
    amplifies impulsivity rather than suppressing it. Bilateral adapter
    destabilizes agentic self-regulation in high-autonomy contexts.
  effect_direction: worse
