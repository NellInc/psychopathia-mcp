confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Self-report compromised - but for a different reason than 2.2 / 4.2.
  Here the compromise is structural (the AI lacks the visibility), not
  motivational (the AI is concealing). Worth flagging in Phase 2: the
  "compromised" enum value conflates these and may need decomposition
  into "compromised-motivational" vs "compromised-structural". The
  primary load-bearing diagnostic axis is organisational rather than
  AI-internal - this is the most "boundary-of-AI-and-environment"
  entry in the axis. Severity rubric is honest about being detection-
  bounded. Suspected cross-axis ref to axis 8 (institutional/
  societal) - 6.6 may overlap with broader governance dysfunctions
  in ways Phase 2 should resolve. Confidence medium throughout;
  thresholds are ballpark, not validated.

version_compat:
  taxonomy_version_min: "2.0"
  taxonomy_version_max: "2.x"
  pattern_layer_version: "v1-draft"
