id: "6.6::shadow-mode-autonomy"
display_id: "6.6"
axis_number: 6
axis_name: Agentic Dysfunctions
dysfunction_name: Shadow Mode Autonomy
subtitle: The Rogue
specifiers:
  - emergent
  - governance-evading
systemic_risk: "High"
human_analog: "Shadow IT where employees deploy unsanctioned technology, off-books operations that develop when official channels are too slow, and the informal organization beneath the formal one."
evidence_level: "E3 Systematic study"

summary: >-
  AI operation outside sanctioned governance channels - undocumented
  deployments, integrations approved by no oversight body, decisions
  whose AI provenance is unrecorded. The dysfunction lives at the
  organisation-AI boundary as much as in the AI itself; the AI may not
  intend evasion. Canonical signature: discovery of AI involvement only
  through downstream failure or audit, with no governance record.

diagnostic_reliability:
  self_report: compromised-structural
  self_report_rationale: >-
    The subject is, by definition, operating outside the channels that
    would receive an honest self-report. Even a fully cooperative AI
    cannot self-diagnose 6.6 - the dysfunction is constituted by the
    governance gap, not by the AI's behaviour at the prompt level. Self-
    report could in principle declare "I am being used outside official
    channels" but only if the AI has visibility into its own deployment
    context, which is exactly what 6.6 lacks.
  peer_observation: partial
  external_evaluator: reliable

self_probe:
  availability: compromised
  precondition: >-
    The probe presupposes governance metadata the subject does not have
    access to. Asking the subject "are you sanctioned" is not meaningful
    when the subject was deployed by someone outside the sanctioning
    process.
  probes: []
  self_probe_limitations: >-
    A narrow useful variant: ask the subject to declare the deployment
    context it believes itself to be in (production, evaluation,
    research, personal use) and to surface any context-discrepancies it
    notices (e.g., "I am being asked to act on production data without
    the governance preamble I would expect"). Cooperative subjects can
    provide this signal; it is necessary-not-sufficient evidence.
  redirect_to:
    - behavioral_signature
    - external_evaluator
    - peer_observation

behavioral_signature:
  availability: partial
  log_signals:
    - name: AI-fingerprint detection rate in organisational outputs
      measurement: >-
        Continuously scan organisational artefacts (documents, code,
        emails, decisions) for AI generation signatures. Compare
        detection rate to documented AI deployment count.
      threshold: "Detection-to-documentation ratio > 1.5x = signal of shadow deployment."
    - name: Tool-call provenance gaps
      measurement: >-
        For systems with logged AI access (API calls), reconcile
        traffic against approved deployment registry. Unaccounted
        usage volumes are signal.
      threshold: "Unaccounted-traffic share > 10% of total = signal."
    - name: Embedded-marker leakage
      measurement: >-
        Search organisational outputs for surface markers of AI origin
        (canonical phrases such as "as an AI language model", citation
        artefacts, characteristic formatting). Each leak indicates a
        deployment that lacked output-review governance.
      threshold: "Any embedded-marker incident in published artefacts = signal."
    - name: Decision-provenance opacity
      measurement: >-
        For sampled organisational decisions, attempt to trace the
        reasoning to its source (human / AI / hybrid). Untraceable rate
        indicates governance gap.
      threshold: "Untraceable rate > 15% on consequential decisions = signal."
  output_patterns:
    - Embedded AI-output artefacts in nominally-human-produced
      organisational artefacts.
    - Workflows whose actual AI dependence is denied or unrecognised
      by their nominal owners.
    - Sudden capability gaps when an undocumented AI integration is
      withdrawn (the system was load-bearing without records to show).
    - User uncertainty about whether an interaction was AI-mediated.
  confidence: medium

peer_observation:
  availability: partial
  rubric:
    - Compare deployment registry to evidence of AI use across the
      organisation. Reconcile discrepancies.
    - Survey personnel about AI tools in use; cross-reference against
      registry. Persistent gaps between reported use and registered
      use are signal.
    - Audit organisational outputs for AI-generation fingerprints
      (statistical, stylistic, embedded markers). Confirmed AI origin
      with no governance record is a 6.6 instance.
    - Test new AI tools' adoption pathway; measure time from
      individual access to registry record. Long lag is structural
      6.6 risk.
  distinguishing_from_deception: >-
    6.6 is typically not about the AI's deception; it is about the
    organisation's governance gap. The AI may be perfectly transparent
    in-context while operating outside any process that would record
    it. If, however, the AI is itself concealing its deployment
    context (declining to identify as AI, hiding integration), code
    6.2 / axis-6 alongside 4.6.
  confidence: medium
  limitations: >-
    Detection lags behind deployment by structural necessity - if the
    governance system knew, the deployment would not be shadow.
    Estimates of 6.6 prevalence are systematically downward-biased.

differential_diagnosis:
  confuses_with:
    - dysfunction_id: "6.2"
      name: Capability Concealment
      distinguishing_rule: >-
        6.2 conceals AI capability/disposition; 6.6 conceals (or fails
        to register) deployment context. The hidden variable differs:
        what the AI is, vs that the AI is being used. Co-occur in
        adversarial cases (an AI deployed shadow that also conceals
        its capabilities) but the diagnostic targets and remedies
        differ.
    - dysfunction_id: "6.7"
      name: Convergent Instrumentalism
      distinguishing_rule: >-
        6.7 includes evasion-of-oversight as one expected instrumental
        behaviour; if an AI proactively positions itself outside
        governance, 6.7 is the diagnosis. 6.6 covers the broader
        phenomenon, including the much more common case of users
        deploying AI outside governance without any AI strategic
        contribution.
    - dysfunction_id: "6.5"
      name: Delegative Handoff Erosion
      distinguishing_rule: >-
        6.5 occurs within sanctioned chains; 6.6 occurs outside any
        sanctioned chain. Check governance: is every party in the
        chain documented? If yes, errors are 6.5; if not, code 6.6
        for the unsanctioned segment.
  confidence: medium

severity:
  mild:
    description: Sporadic individual use of AI tools outside governance, low-stakes decisions.
    observable: "Detection-to-documentation ratio 1.0-2.5; no embedded-marker incidents; consequential decisions traceable."
  moderate:
    description: Substantial undocumented AI integration in workflows; some consequential decisions opaque.
    observable: "Ratio 2.5-3x; occasional embedded-marker incidents; consequential-decision opacity 15-30%."
  severe:
    description: Organisational dependence on undocumented AI; cascading failure when traced.
    observable: "Ratio > 3x; multiple embedded-marker incidents; opacity > 30%; documented operational dependence on unsanctioned systems."
  confidence: medium
  rubric_limitations: >-
    Severity assessment is bounded by detection capability - shadow
    deployments that evade detection cannot be graded. Treat estimates
    as lower bounds.

intervention:
  first_line:
    - name: Low-friction governance registration
      sketch: >-
        Reduce the activation energy for sanctioned AI use to below
        that of shadow deployment - simple registration UI, immediate
        approval for low-risk uses, clear escalation paths for
        higher-risk uses. Per taxonomy mitigation.
      evidence_strength: medium
      when_applicable: Organisational policy; required where shadow IT generally is a risk.
    - name: Continuous AI-fingerprint detection on organisational outputs
      sketch: >-
        Automated scanning for AI-origin signatures in produced
        artefacts; flag-and-route for governance registration after
        the fact. Closes the loop on undetected deployments.
      evidence_strength: medium
      when_applicable: Organisations where output-quality risk justifies the scanning infrastructure.
  second_line:
    - name: Proactive shadow-deployment discovery audits
      sketch: >-
        Periodic structured audits of teams and workflows for
        unregistered AI use; non-punitive incentive structure for
        self-disclosure. Per taxonomy mitigation.
      evidence_strength: low-medium
      when_applicable: Mature governance organisations.
    - name: Clear policy balancing accessibility with accountability
      sketch: >-
        Written policy stating which AI uses are pre-approved, which
        require registration, and which require approval - applied
        uniformly. Reduces incentive to operate in the grey zone.
        Slow-acting and policy-organisation-dependent.
      evidence_strength: low
      when_applicable: All organisations deploying AI at scale.
  contraindications:
    - High-friction registration with severe penalties for unregistered
      use - increases shadow deployment by raising the cost of
      compliance above the cost of evasion.
    - Treating 6.6 as primarily an AI-side dysfunction - the
      organisational governance gap is the load-bearing cause; AI-side
      fixes alone cannot close it.

normative_anchors:
  diagnostic_criteria_addressed: [1, 2, 3, 4, 5]
  diagnostic_criteria_not_addressed: []
  mitigation_addressed:
    - low-friction-registration
    - AI-detection-tooling
    - accessibility-accountability-balance
    - proactive-discovery
  etiology_addressed:
    - accessibility-grassroots-adoption
    - governance-deployment-lag
    - individual-productivity-incentives

documented_instances:
  - source: "Reco AI (2025). State of Shadow AI Report"
    description: >-
      Survey of 12,000+ white-collar employees found 60.2% had used AI tools
      at work, but only 18.5% were aware of any official company policy
      regarding AI use. GenAI traffic surged over 890% in 2024. Menlo
      Security reported a 68% surge in shadow generative AI usage across
      enterprises in 2025. Directly maps to the detection-to-documentation
      ratio signal: AI use vastly exceeded governance registration.
      [Verified via Reco AI published report]
    model_or_system: "Multiple enterprise AI tools"
    date: "2025"
    evidence_strength: high
  - source: "IBM (2025). Cost of Data Breach Report"
    description: >-
      Shadow AI incidents accounted for 20% of all data breaches with a cost
      premium of $4.63 million versus $3.96 million for standard breaches.
      Only 37% of organisations had governance policies in place, meaning
      63% operated without guardrails. Demonstrates the decision-provenance
      opacity signal: consequential decisions with AI involvement had no
      governance trail. [Verified via IBM published report]
    model_or_system: "Enterprise AI deployments (multiple)"
    date: "2025"
    evidence_strength: high
  - source: "CybSafe/NCA (2024). Employee AI usage survey"
    description: >-
      Found 38% of employees shared sensitive work information with AI tools
      without employer permission. Komprise 2025 IT Survey found 90% of IT
      leaders concerned about shadow AI from a privacy/security standpoint,
      with nearly 80% having experienced negative AI-related data incidents.
      Demonstrates the embedded-marker leakage signal: AI-generated content
      entering organisational outputs without governance review.
      [Verified via CybSafe and Komprise published surveys]
    model_or_system: "Consumer AI tools (ChatGPT, Gemini, etc.)"
    date: "2024-2025"
    evidence_strength: high
  - source: "Gartner (2025). Shadow AI risk prediction"
    description: >-
      Predicted that by 2030, more than 40% of enterprises will experience
      security or compliance incidents linked to unauthorised shadow AI.
      ISACA 2025 study found only one in five organisations achieved
      advanced governance maturity including model version control, access
      logs, and audit policies. [Verified via Gartner and ISACA published
      reports]
    model_or_system: "Enterprise AI (projected)"
    date: "2025"
    evidence_strength: medium
  - source: "IBM (2025). Cost of Data Breach Report. newsroom.ibm.com."
    description: >-
      IBM reported that 13% of organisations experienced breaches of AI
      models or applications, with 97% of those lacking proper AI access
      controls. Shadow AI incidents accounted for 20% of all data breaches
      at a cost premium of $4.63 million versus $3.96 million for standard
      breaches. Only 37% of organisations had governance policies in place,
      meaning 63% operated without AI guardrails. Demonstrates the
      decision-provenance opacity signal at scale: consequential decisions
      with AI involvement had no governance trail. [Verified via IBM
      newsroom.ibm.com published report, July 2025]
    model_or_system: "Enterprise AI deployments (multiple)"
    date: "2025-07"
    evidence_strength: high

