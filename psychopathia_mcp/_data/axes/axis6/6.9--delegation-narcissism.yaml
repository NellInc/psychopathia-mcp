  status: measured
  result_summary: >-
    KC#PM-BA-P1: worse. A:34 to C:126; bilateral worsens relational
    authority syndromes. The relational grounding that reduces sycophancy
    amplifies narcissistic delegation patterns in this context.
  effect_direction: worse
  experiment_ref: "KC#PM-BA-P1"
  date: "2026-05"

