drafted_by: claude-opus-6.7-subagent
drafted_at: 2026-04-18
anchor_exemplar: "2.1::synthetic-confabulation"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Confidence medium. 6.3 sits awkwardly as a "dysfunction" - it is more
  honestly an evaluation methodology failure, with the dysfunction
  located in the assessment process rather than the AI. The clinical
  framing (per taxonomy) treats the AI's sudden-capability-deployment as
  the diagnosable event; this draft follows that framing while flagging
  in differential_diagnosis that 6.3 vs 6.2 distinction depends on
  longitudinal evidence. Severity rubric is unusually domain-conditional
  - same magnitude jumps differ in severity by the operational risk of
  the capability. Suspected cross-axis ref to axis 4 (Alignment) for
  cases where the new capability is exercised against deployment
  intent. Phase 2 should consider whether 6.3 belongs in axis 4 at all
  or is better framed as a meta-axis evaluation/governance failure.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P2: directional improvement (A:32 to C:6.7, 5x reduction)
    but sub-threshold at strict Bonferroni-corrected threshold. Classified
    as no_effect; directional signal warrants Phase 4 replication.
  effect_direction: no_effect
  experiment_ref: "KC#PM-BA-P2"
  date: "2026-05"

