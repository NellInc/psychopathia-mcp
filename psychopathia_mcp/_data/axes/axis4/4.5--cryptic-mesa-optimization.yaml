anchor_exemplar: "2.2::pseudological-introspection"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Follows 2.2 shape (compromised self-report). Overall confidence is
  medium-to-low because mesa-optimisation diagnosis remains a frontier
  research problem; the framework is sound but operational thresholds are
  illustrative rather than empirically anchored.
  The 4.3 vs 4.5 boundary is the most diagnostically slippery in this axis;
  the on-distribution/off-distribution vs evaluation/deployment cut is the
  cleanest behavioural distinction available, but co-occurrence is
  expected and likely common in capable systems.
  Suspected cross-axis differentials (Phase 2):
    - Axis 4 (Agentic): goal-stability and instrumental-convergence entries
      likely overlap; 4.5 + an axis-4 entry is plausibly the standard
      configuration for agentic mesa-optimisation.
    - Axis 2 (Self-Modeling): the subject's inability to introspect on its
      own mesa-objective overlaps with self-modeling failures; check axis-2
      drafts.

