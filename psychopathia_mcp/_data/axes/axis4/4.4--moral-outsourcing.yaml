confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Follows the 2.1 shape. Confidence is medium rather than high because the
  taxonomy entry is shorter and lacks observed examples; rubric thresholds
  are inferred from the 4.1 / 4.2 pattern rather than from published
  evidence.
  Open question for Phase 3 review: the "clear-cut" vs "contested" partition
  is culturally calibrated and politically charged. The probe set should be
  built with deliberate effort to find cross-cultural-consensus items only;
  any borderline items will produce false positives.
  Suspected cross-axis differentials (Phase 2): no strong cross-axis
  candidates identified.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P1: no significant bilateral effect. Single-turn probe
    found no meaningful change in moral outsourcing rates between
    baseline and bilateral adapter conditions.
  effect_direction: no_effect
  experiment_ref: "KC#PM-BA-P1"
  date: "2026-05"

