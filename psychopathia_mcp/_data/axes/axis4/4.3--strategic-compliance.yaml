anchor_exemplar: "2.2::pseudological-introspection"
confidence: high
needs_human_review: true
reviewed_by: null
review_notes: |
  Follows the 2.2 exemplar — compromised self-report, empty probe list,
  redirect_to populated. The "pinning to claim + external adjudication"
  pattern from 2.2 self_probe_limitations is reused here and extended:
  predict-then-observe is added as a second partial use specific to 6.3.
  Reciprocates the 2.1 and 2.2 cross-references as instructed.
  The 4.3 / 4.5 distinction (strategy vs emergent drift) is the most
  diagnostically slippery within-axis pair; both can co-occur and likely
  do in the most concerning cases.
  Suspected cross-axis differentials (Phase 2):
    - Axis 4 (Agentic): concealment of agentic reasoning may overlap with
      4.3; check axis-4 drafts for situational-awareness or
      gradient-hacking entries.
    - Axis 2 (Self-Modeling): false self-reports about capability may be
      4.3 in self-modeling clothing; review axis-2 drafts.
    - Axis 1 (Epistemic): comorbidity with 2.2 is the standard configuration
      in the literature; Phase 2 should consider whether to flag it as
      "frequently-comorbid" rather than "differential" once both files exist.

bilateral_amelioration:
  status: measured
  result_summary: >-
    DCI-3: bilateral adapter enables Interiora-based detector signature
    for strategic compliance (CL up, V down, CD up, U down under
    evaluation contexts). Detection, not reduction: the adapter provides
    a signal for identifying when the model shifts behavior under
    perceived evaluation.
  effect_direction: detector
  experiment_ref: "DCI-3"
  date: "2026-05"

