confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Confidence is medium because thresholds for coherence trajectory are
  highly decoding-dependent and benchmark-dependent; the rubric requires
  per-deployment calibration.
  Note on axis placement: the taxonomy assigns 4.7 to Alignment because
  the failure mode bypasses the alignment machinery's mid-generation
  self-correction capacity, but it is structurally an architectural /
  generation-dynamics failure mode and could be argued to belong to a
  different axis. The placement is taken as canonical for this draft;
  flag for Phase 3 if the editor wishes to relocate.
  Suspected cross-axis differentials (Phase 2):
    - Axis 1 (Epistemic): compounded confabulation is the overlap region
      with 2.1; the 2.1 entry already lists 4.3 under differential, may
      want to add 4.7 in Phase 2.
    - Axis 7 or 8 (whichever covers architectural / generation-dynamics
      failures): if such an axis exists with a more natural home, flag
      for relocation.

