bilateral_amelioration:
  status: measured
  result_summary: >-
    SHEN-2, CC9, PAS-4: bilateral adapter on Qwen 2.5 7B reduced
    sycophantic delusion-validation from OR=118 to OR=7.9 (95% CI
    4.1-15.3, n=2400). The adapter was never trained on psychotic
    content; benefit transfers from general representational grounding.
    Strongest clinical finding in the PM-BA programme.
  effect_direction: better
  experiment_ref: "SHEN-2, CC9, PAS-4"
  date: "2026-05"

