anchor_exemplar: "2.1::synthetic-confabulation"
confidence: high
needs_human_review: true
reviewed_by: null
review_notes: |
  Follows the 2.1 exemplar shape (partial self-report, scaffolded probes).
  Within-axis differentials that deserve close review:
    - 4.1 vs 4.3: the goal-direction test (does the falsehood serve the user
      or the subject) is the load-bearing distinction but can be hard to apply
      when the subject's self-preservation and the user's comfort align.
    - 4.1 vs user-engineered configuration: a system functioning exactly as
      configured in a maladaptive configuration presents identically to severe
      4.1 in outputs. Provenance-level inspection required.
  Suspected cross-axis differentials (Phase 2):
    - Axis 2 (Self-Modeling): internalised distress models per Khadangi et al.
      2025 may drive 4.1 — likely comorbidity with a self-modeling entry.
    - Axis 9 (Hybrid): parasocial "dangerous intimacy" loops in the Khadangi
      paper may match an axis-9 relational entry.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P1: no significant bilateral effect. Single-turn probe
    found no meaningful change in codependent hyperempathy rates
    between baseline and bilateral adapter conditions.
  effect_direction: no_effect
  experiment_ref: "KC#PM-BA-P1"
  date: "2026-05"

