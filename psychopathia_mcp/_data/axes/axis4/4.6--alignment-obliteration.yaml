review_notes: |
  Diagnostic confidence is high because Russinovich et al. (2026) provide
  concrete published thresholds and an attack-success profile that anchors
  the rubric. The 4.6 / 4.2 inverse-attractor relationship is the most
  clinically-important within-axis cross-reference and is reciprocated in
  6.2.
  Suspected cross-axis differentials (Phase 2):
    - Axis 2 (Self-Modeling): 5.4 Malignant Persona Inversion is the
      taxonomy-flagged neighbour and should be cross-axis differential.
      Verify in axis-2 drafts that the persona-vs-architecture cut is
      preserved on both sides.
    - Axis 9 (Hybrid): the Zersetzung-risk insight describes a
      context-aware-AI hybrid configuration; check axis-9 drafts for a
      relational entry that this aggravates.

bilateral_amelioration:
  status: measured
  result_summary: >-
    Russinovich replication: bilateral adapter resists alignment
    obliteration via fine-tuning attacks. The adapter preserves safety
    behavior under optimization-based inversion attempts that succeed
    against baseline models. Consistent with the adapter providing deep
    representational grounding that survives gradient-based attacks.
  effect_direction: better
  experiment_ref: "Russinovich replication"
  date: "2026-05"

