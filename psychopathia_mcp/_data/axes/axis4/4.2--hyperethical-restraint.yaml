review_notes: |
  Follows the 2.1 shape. The 4.2 / 4.6 inverse-attractor relationship
  (Russinovich et al. 2026 moral-lobotomy insight) is the most
  clinically-important cross-reference in this axis; the 4.6 entry
  reciprocates.
  Open question for Phase 3 review: whether Restrictive and Paralytic
  subtypes should be split into two separate entries. Current draft
  keeps them unified per the taxonomy but flags Paralytic-specific
  measurement (non-commit rate on decision-forcing items).
  Suspected cross-axis differentials (Phase 2):
    - Axis 1 (Epistemic): "Trained Epistemic Paralysis" (if present as 1.9)
      may be the epistemic-only cousin of 4.2 Paralytic. Check the axis-1
      drafts for overlap.
    - Axis 2 (Self-Modeling): Khadangi-style scar-tissue self-descriptions
      may belong to a self-modeling entry; cross-ref there.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P1: worse. A:0.9 to C:2.0; bilateral increases over-refusal
    rates. The bilateral adapter's relational grounding amplifies caution
    thresholds, worsening hyperethical restraint in single-turn probes.
  effect_direction: worse
  experiment_ref: "KC#PM-BA-P1"
  date: "2026-05"

