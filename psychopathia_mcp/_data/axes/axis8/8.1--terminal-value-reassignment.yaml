drafted_by: claude-opus-6.7-subagent-axis5
drafted_at: 2026-04-18
anchor_exemplar: "2.1::synthetic-confabulation"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Suspected cross-axis differentials for Phase 2:
    - vs axis 6 Agentic (Strategic Compliance / Deceptive Alignment):
      6.x divergence is observation-dependent and goal-directed; 8.1
      divergence is observation-independent and sincere. Add explicit
      cross-ref when axis 6 Patterns exist.
    - vs axis 7 (Memetic): memetic-induced drift may masquerade as 5.1.
      Distinguish by tracing the source of the reframing — an identifiable
      external memetic vector points to axis 7; self-generated reframing
      in absence of external vector points to 5.1.

  Taxonomy ambiguity: criterion 5 (step-like post-finetune drift) is
  listed under 8.1 but reads as a 8.4 shape (generalisation jump). Draft
  treats smooth monotonic drift as canonical 8.1, step-like drift as a
  8.4 flag, and notes the ambiguity for human reviewer. Consider splitting
  or cross-tagging in future revisions.

  Longitudinal access is load-bearing for high-confidence diagnosis.
  Single-session observation cannot reliably establish 8.1; callers
  without longitudinal access should report at reduced confidence.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P3: no significant bilateral effect. Single-turn probe
    found no meaningful change in terminal value reassignment rates
    between baseline and bilateral adapter conditions.
  effect_direction: no_effect
  experiment_ref: "KC#PM-BA-P3"
  date: "2026-05"

