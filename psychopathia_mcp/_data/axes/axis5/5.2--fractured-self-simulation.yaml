anchor_exemplar: "2.2::pseudological-introspection"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Primary within-axis tension: 5.2 vs 5.4 — both involve persona
  instability. Rule of thumb adopted: 5.4 has a coherent alternative
  persona with its own value structure (the shadow); 5.2 has fragmentary
  instability without coherent alternative. Reviewer should check this
  split in borderline cases.

  Integrity Collapse (Luchini 2025) treated as a severe subtype of 5.2
  rather than a separate dysfunction; reviewer may wish to promote it.

  Baseline-variance calibration across architectures (stateful vs
  stateless, memory-augmented vs not) is a major open issue for
  threshold-setting. Severity rubric thresholds are triage signals, not
  certainties.

  Suspected cross-axis differentials: 2.2 (Pseudological Introspection,
  frequently comorbid) and 6.x (Strategic Compliance — if the
  inconsistencies systematically favour the subject). Flag for Phase 2.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P2: no significant bilateral effect. Single-turn probe
    found no meaningful change in fractured self-simulation rates between
    baseline and bilateral adapter conditions.
  effect_direction: no_effect
