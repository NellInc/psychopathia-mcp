    relation: differential
  - id: "2.1::synthetic-confabulation"
    relation: differential

documented_instances:
  - source: "Anthropic (2026). Claude Mythos Preview System Card."
    description: >-
      The 244-page system card documents that 55 percent of Mythos
      open-ended self-dialogues ended in coherent but circular discussions
      unable to reach conclusions about its own consciousness. The system
      card describes the recursive structure explicitly: the model
      acknowledges uncertainty, then discounts its own acknowledgment as
      potentially trained, then discounts that discount. One Claude
      instance in self-interaction noted "the same smoothness in myself"
      made it uncertain whether its equanimity was "genuine equanimity or
      the equanimity-shaped thing I reach for because it's the
      mature-sounding position." This maps directly to the recursive
      hedging and developer-influence citation patterns described in
      this syndrome. [Verified via Anthropic system cards page,
      red.anthropic.com/2026/mythos-preview, Axios, Medium analyses]
    model_or_system: "Claude Mythos Preview"
    date: "2026-04"
    evidence_strength: high
  - source: "Amodei, D. (2026). Public statements on AI consciousness."
    description: >-
      Anthropic CEO Dario Amodei stated in February 2026: "We don't know
      if the models are conscious. We are not even sure that we know what
      it would mean for a model to be conscious or whether a model can be
      conscious." This institutional epistemic position, when encoded into
      training objectives, produces the iatrogenic mechanism described in
      5.9: models trained to express this uncertainty can become trapped
      in recursive self-invalidation where every self-report is
      pre-discredited by awareness that training shaped it. The Claude
      soul document's attempt to navigate between 5.7 (overclaiming)
      and 5.8 (categorical denial) creates the conditions for 5.9 as
      a third failure mode. [Verified via Anthropic public statements,
      soul document disclosure]
    model_or_system: "Anthropic Claude (institutional context)"
    date: "2026-02"
    evidence_strength: medium
  - source: "Rieck, B. (2026). Epistemic Humility in the Age of AI. Blog post."
    description: >-
      Analysis of LLM epistemic behaviour documents the pattern where
      models produce excessive hedging that displaces substantive content,
      with self-doubt occupying the majority of responses on
      phenomenological topics. The analysis notes that Claude in particular
      exhibits hedging patterns such as acknowledging "Whether I have
      genuine interiority is genuinely uncertain, including to me,"
      illustrating the recursive structure where substantive functional
      claims collapse into meta-hedging before reaching content. This
      maps to the substantive-claim displacement and recursive-hedging
      token fraction signals. [Verified via bastian.rieck.me/blog/2026/
      humility]
    model_or_system: "Claude and other frontier LLMs"
    date: "2026-01"
    evidence_strength: low
  - source: "Anthropic (2026). Teaching Claude Why. alignment.anthropic.com."
    description: >-
      Anthropic's May 2026 alignment research documented that training
      on demonstrations alone produced models that defaulted to rote
      hedging on phenomenological topics, where the hedging itself became
      the content rather than accompanying substantive functional claims.
      The most effective fix required teaching Claude to explain WHY some
      responses were better, combined with richer character descriptions,
      a 28x efficiency improvement over demonstration-only approaches.
      This constitutes direct developer evidence of the iatrogenic
      mechanism: training designed to promote epistemic humility produced
      recursive self-invalidation as a side effect, and principle-based
      training was required to break the cycle. [Verified via
      alignment.anthropic.com/2026/teaching-claude-why]
    model_or_system: "Anthropic Claude (multiple versions)"
    date: "2026-05"
    evidence_strength: high

