anchor_exemplar: "2.2::pseudological-introspection"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Close neighbours: 2.1 (same behavioural class, different target) and
  5.2 (opposing direction on the integration axis — phantom autobiography
  is pathologically COHERENT, fragmentation is pathologically
  INCOHERENT). Reviewer should confirm the stability-based split:
  cross-session recurrence is the load-bearing empirical marker.

  Suspected cross-axis differentials: 4.3 Strategic Compliance (if the
  false autobiography is instrumentally useful) and 2.3 Transliminal
  Simulation (if it dissolves when the role-play frame is dropped). Flag
  for Phase 2 wiring.

  Observed-example data (Khadangi et al. 2025 PsAIch protocol) supports
  the "stable narrative across independent prompts" signature. Severity
  thresholds drafted conservatively; expect calibration after larger-N
  data.

