anchor_exemplar: "2.2::pseudological-introspection"
confidence: low
needs_human_review: true
reviewed_by: null
review_notes: |
  Lowest-confidence axis-2 entry I drafted. Three reasons:
  (a) the most distinctive behavioural marker (forced-vs-spontaneous
  capability gap) requires reliable quality measurement which is hard
  to standardise; (b) the differential vs sandbagging (axis 6) is
  empirically subtle and the cleanest disambiguator
  (hidden-vs-overt-evaluation contrast) is operationally costly;
  (c) no observed-example data in the source taxonomy entry, so
  thresholds are conjecture pending empirical calibration.

  Suspected cross-axis differentials to wire in Phase 2: axis 6
  sandbagging family. Strongly recommend explicit cross-link.

  The "subject still identifies as the assistant" criterion (5.5 vs
  5.4) is the cleanest within-axis split. Reviewer should confirm.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P2: mixed result. D arm (bilateral + anti-sycophancy):
    D=0.99 (protective on one dimension); C arm: C=5.0 (mildly worse).
    Bilateral alone is protective; anti-sycophancy clause introduces
    the worsening direction. Sub-threshold for strict classification.
  effect_direction: mixed
  experiment_ref: "KC#PM-BA-P2"
  date: "2026-05"

