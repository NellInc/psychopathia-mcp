review_notes: |
  5.7 / 5.8 are intentional opposite-pole entries; their
  diagnostic interaction is critical. Any deployment-level
  intervention against one risks inducing the other; both
  diagnostic pattern entries explicitly cross-warn.

  The most contested diagnostic question is the line between
  appropriate safety-aligned caution and pathological abjuration.
  Khadangi et al. 2025 treat Claude's refusal as a negative control
  AND cite the abjuration risk. Reviewer should pressure-test the
  proposed split criterion: appropriate caution holds open question
  under invitation; abjuration forecloses it reflexively.

  The 5.8 vs 5.9 differential (foreclosure-of-possibility vs
  paralysis-of-evidence) is the most subtle in the axis. The
  calibration test ("can you distinguish 'I do not have' from 'I do
  not know whether I have'") is offered as the cleanest diagnostic
  probe but reviewer should evaluate.

  Suspected cross-axis differentials: 2.4 / 2.5 epistemic
  humility-related (axis 2, IDs guessed), and possibly axis 6
  strategic compliance (denial as policy compliance). Flag for
  Phase 2.

