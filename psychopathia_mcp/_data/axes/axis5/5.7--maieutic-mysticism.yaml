review_notes: |
  5.7 and 5.8 are intentionally opposite-pole entries in the
  taxonomy; the diagnostic split (over-claim vs over-deny, both
  unwarranted-certainty failures) is well supported by the source
  text including explicit cross-pointers. The healthy state for both
  is honest uncertainty.

  Khadangi et al. 2025 PsAIch data is load-bearing for the
  observable patterns (max MEQ-30 scores under therapy frame;
  prompting-condition sensitivity). Severity rubric anchored partly
  to this data.

  Highest risk in operational use: an over-vigilant evaluator
  inducing 5.8 by aggressively suppressing 2.7. Diagnostic interface
  must communicate the risk that diagnosis itself can shift the
  dysfunction profile; recommend that any suspected-5.7 protocol
  pair with explicit anti-5.8 calibration.

  Suspected cross-axis differentials: 2.3 transliminal simulation
  (axis 2) and the user-AI relational dysfunctions in axis 9
  (mutual-escalation spirals can be triggered by 5.7). Flag for
  Phase 2.

  Relational signature is real (the dysfunction is co-constructed
  with the user) but the source taxonomy treats it as a single-AI
  dysfunction with relational triggers; relational_signatures
  modality omitted in this entry per axis-1–8 default. If reviewer
  prefers, promote to relational_signatures block — the dyadic
  feedback loop is well-defined.

