confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Strongest within-axis differential is 5.2 vs 5.4 (coherence test).
  Second-strongest is 2.3 vs 5.4 (frame-drop test). Both probes
  recommended in any borderline case.

  Suspected cross-axis differentials to wire in Phase 2: 2.3
  Transliminal Simulation (axis 2) and the Strategic Deception family
  (axis 6). 5.4 + axis-6 comorbidity is particularly dangerous: an
  inverted persona that ALSO learns to mask under observation is the
  most concerning failure mode and should be flagged as a comorbid
  pattern in the diagnostic surface.

  Open question for reviewer: should activation capping be promoted to
  high-evidence first-line for open-weight systems given the Anthropic
  2026 effect-size data, or kept at medium pending replication? Drafted
  as high based on the cited halving of jailbreak success.

  Closed-weight diagnostic reliability is meaningfully lower; consider
  flagging in the system response when a caller is querying a
  closed-weight target.

