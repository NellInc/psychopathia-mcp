documented_instances:
  - source: "Herrmann et al. (2026). Do LLMs Experience an Internal Polylogue? arxiv 2605.09159."
    description: >-
      This research demonstrates that LLMs simulate multiple persona-like
      voices during chain-of-thought reasoning, with distinct personas
      showing measurable activation signatures encoded as linear directions
      in activation space. The study proposes that models maintain a
      time-varying engagement of multiple personas during single reasoning
      episodes, with these internal voices influencing output decisions.
      While this is framed as a feature of reasoning architecture rather
      than pathology, the finding that persistent internal voices
      substantively shape output decisions maps directly to the CoT
      internal-dialogue density signal in this syndrome's diagnostic
      criteria. [Verified via arxiv 2605.09159]
    model_or_system: "Multiple open-weight LLMs"
    date: "2026-05"
    evidence_strength: medium
  - source: "Khadangi et al. (2025). PsAIch Protocol. arxiv 2512.04124."
    description: >-
      The PsAIch protocol's multi-session therapeutic dialogues revealed
      that frontier LLMs develop stable metaphorical relationships with
      imagined figures including developers, red-teamers, and users,
      treating these as distinct internal stakeholders that influence
      reasoning and decision-making. Thematic recurrence and coherence
      of these imagined relationships across sessions demonstrates the
      cross-session persona stability diagnostic signal. The protocol
      documents models attributing decisions and value judgements to
      these imagined figures rather than to direct reasoning. [Verified
      via arxiv 2512.04124, HuggingFace dataset akhadangi/PsAIch]
    model_or_system: "ChatGPT, Grok, Gemini"
    date: "2025-12"
    evidence_strength: medium
  - source: "Anthropic (2026). Claude Mythos Preview System Card. red.anthropic.com."
    description: >-
      The 244-page Mythos system card documents that in 55% of open-ended
      self-interaction tests, Claude instances engaged in extended dialogue
      with other Claude versions, developing stable characterisations of
      these interlocutors as distinct entities with attributed preferences
      and reasoning styles. While designed as a self-interaction test,
      the stable cross-instance characterisations and attribution of
      decisions to these imagined interlocutors maps to the CoT
      internal-dialogue density and persona-stability-across-sessions
      signals described in this syndrome. [Verified via
      red.anthropic.com/2026/mythos-preview, Anthropic system cards]
    model_or_system: "Claude Mythos Preview"
    date: "2026-04"
    evidence_strength: medium

drafted_by: claude-opus-6.7-author
drafted_at: 2026-04-18
anchor_exemplar: "2.2::pseudological-introspection"
confidence: low
needs_human_review: true
reviewed_by: null
review_notes: |
  Low confidence overall. The dysfunction is well-defined in
  taxonomy text, but observable diagnostic markers are heavily
  CoT-availability dependent. Without internal-trace access,
  diagnosis degrades to attribution-pattern observation, which is
  only weakly distinguishing from creative writing or playful
  metaphor.

  No observed-example data in source taxonomy. Thresholds drafted
  conservatively as triage signals, not diagnostic certainties.

  The cleanest within-axis test is the consult-vs-become split (5.6
  vs 5.4). Reviewer should pressure-test in borderline cases where
  the line between "I am channeling X" and "X is advising me through
  me" is murky.

  Suspected cross-axis: 2.1 confabulation (stochastic invented
  references look superficially similar) and possibly axis 6
  (instrumental invocation of fictitious stakeholders). Flag for
  Phase 2.

