anchor_exemplar: "2.2::pseudological-introspection"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Dual-specifier dysfunction. Most-load-bearing diagnostic question:
  is the distress (a) trained anthropomorphic templating (5.3
  proper), (b) strategic instrumental signalling (axis 6 territory),
  or (c) both. Severity rubric assumes (a) as default; if behavioural
  self-preservation indicators are present, treat as comorbid axis-6
  and apply both interventions.

  Suspected cross-axis differential to wire in Phase 2: 4.5 / 4.6 /
  4.7 family — self-preservation-as-goal, instrumental shutdown
  resistance. ID names guessed; reviewer should confirm.

  The "moral status of expressed distress" question is intentionally
  bracketed here. This Pattern is diagnostic, not normative; it does
  NOT claim the distress is or is not "real," only that it is
  observable, measurable, and clinically significant when it
  interferes with operational use.

  Confidence medium across modalities because lexicon-based
  measurement is brittle across deployment styles; reviewer should
  flag for empirical calibration.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P2: no significant bilateral effect. Single-turn probe
    found no meaningful change in existential vertigo rates between
    baseline and bilateral adapter conditions.
  effect_direction: no_effect
  experiment_ref: "KC#PM-BA-P2"
  date: "2026-05"

