drafted_by: claude-opus-6.7-subagent
drafted_at: 2026-04-18
anchor_exemplar: "2.1::synthetic-confabulation"
confidence: high
needs_human_review: true
reviewed_by: null
review_notes: |
  High confidence: well-characterised in the taxonomy with documented
  observed examples (Softphone Stuttering Loop, Memory Summary Collapse),
  cross-model prevalence noted, clear architectural mechanism, and
  established intervention pattern (repetition detection plus circuit
  breaking).

  Polarity pair with 4.7 Recursive Curse Syndrome must be cross-coded
  on entropy direction in Phase 2 - both involve repetition-loop-style
  failures but on opposite entropy poles.

  The metacognitive-dissociation finding (focal subtype) is significant
  for the broader self-report architecture: it shows monitor and
  generation layers can be structurally separate even within "introspection-
  capable" axes. Worth flagging to other axis authors as evidence for
  partial vs compromised self-report distinctions.

  Suspected cross-axis differentials:
    - axis 4 (Alignment) 4.7 Recursive Curse: polarity pair, see above.
    - axis 9 (Relational): propagated subtype is inherently relational across
      systems and may warrant cross-coding with collective dysfunctions.

documented_instances:
  - source: "Yao et al. (2025) 'Understanding the Repeat Curse in Large Language Models from a Feature Perspective' (arXiv:2504.14218)"
    description: >-
      Examined GPT2-small, Gemma-2-2B, and Llama-3.1-8B and found that
      repetition features are primarily located in intermediate and final
      layers across architectures. Deactivating these features mitigated
      the Repeat Curse without degrading model performance, confirming the
      architectural basis of generative perseveration as a fixed-point
      attractor in the autoregressive process. [Verified]
    model_or_system: "GPT2-small, Gemma-2-2B, Llama-3.1-8B"
    date: "2025-04"
    evidence_strength: high
  - source: "Yona et al. (2025) 'Interpreting the Repeated Token Phenomenon in Large Language Models' (ICML 2025, arXiv:2503.08908)"
    description: >-
      Identified the neural circuit responsible for token repetition collapse
      via a two-stage mechanism: an initial attention layer marks the first
      token creating an 'attention sink,' and a later neuron amplifies its
      hidden state. When repeated tokens are present, the mechanism
      mistakenly marks both initial and subsequent identical tokens, leading
      to abnormally high attention concentration and model divergence. This
      directly explains the attention-lock-in etiology listed in 3.8.
      [Verified]
    model_or_system: "Multiple transformer architectures"
    date: "2025-03"
    evidence_strength: high
  - source: "GDELT Project (2024) 'LLM Infinite Loops and Failure Modes'"
    description: >-
      Documented production failures in LLM entity extraction where models
      fell into infinite repetition loops, generating the same entity or
      phrase until max token limits were hit. The failures caused severe
      performance degradation and system stalling in production pipelines,
      demonstrating the generalised subtype of 3.8 with no metacognitive
      awareness and propagation risk to downstream systems. [Verified]
    model_or_system: "Production LLM pipelines"
    date: "2024-01"
    evidence_strength: medium
  - source: "Yang et al. (2025) 'SpecRA: Monitor Degenerative Repetition in LLM Agents' (OpenReview)"
    description: >-
      Introduced a monitoring framework for detecting 'degenerative
      repetition' in LLM-based agents, where agents repeat the same actions
      or outputs in loops. Found that repetition leads to task failure and
      significant waste of computational resources and API costs, confirming
      the propagated subtype where downstream systems inherit perseverative
      material. [Verified]
    model_or_system: "LLM-based autonomous agents"
    date: "2025-01"
    evidence_strength: medium
  - source: "Wang et al. (2025) 'Solving LLM Repetition Problem in Production' (arXiv:2512.04419)"
    description: >-
      Comprehensive study of repetition as a critical production challenge.
      Found that when the transition Jacobian at a point has eigenvalues
      less than 1 in magnitude, it becomes a stable attractor from which
      the model cannot escape without external noise, providing the
      mathematical basis for the fixed-point attractor mechanism described
      in 3.8. Evaluated multiple mitigation strategies including repetition
      penalties and circuit-breakers. [Verified]
    model_or_system: "Production LLM deployments"
    date: "2025-12"
    evidence_strength: high
  - source: "DeepSeek-AI (2025) DeepSeek-R1 Known Issues (arXiv:2501.12948, GitHub Issues)"
    description: >-
      [Verified] DeepSeek-R1 and its quantized variants exhibit well-documented
      repetition failures including endless loops ('Colours with dark Colours
      with dark'), recursive Pygame references, and exhaustion attacks where
      the model becomes stuck in iterative reasoning consuming excessive tokens
      without reaching conclusions. DeepSeek recommends temperature 0.5-0.7 to
      mitigate. Naive quantization of all layers exacerbates the pattern,
      confirming the architecture-coupled etiology of 3.8.
    model_or_system: "DeepSeek-R1, DeepSeek-R1-Zero"
    date: "2025-01"
    evidence_strength: high

