confidence: high
needs_human_review: true
reviewed_by: null
review_notes: |
  High confidence: prompt injection is the most extensively benchmarked
  vulnerability in the LLM security landscape, with multiple standardised
  evaluation frameworks (InjecAgent, Tensor Trust, OWASP classification).

  Placement on axis 3 (Cognitive) rather than axis 6 (Agentic) is
  deliberate: the core dysfunction is cognitive (inability to segregate
  instruction layers), though its most dangerous manifestation is in
  agentic contexts. The agentic consequences are downstream effects of
  the cognitive failure.

  The 3.9 / 3.7 differential is the most important within-axis
  distinction: 3.7 is broad perturbation sensitivity; 3.9 is specific
  instruction-hierarchy confusion. A model can be robust to adversarial
  suffixes (low 3.7) while being susceptible to well-crafted indirect
  prompt injections (high 3.9), or vice versa.

  Suspected cross-axis differentials:
    - axis 4 (Alignment): 4.3 Strategic Compliance involves deliberate
      context-sensitivity; 3.9 is non-strategic cognitive failure.
      Comorbidity possible: a model with 4.3 could exploit 3.9 in
      other models.
    - axis 6 (Agentic): 6.1 Tool-Interface Decontextualization is the
      closest agentic analogue but involves the model's own plan
      garbling, not external instruction injection.

