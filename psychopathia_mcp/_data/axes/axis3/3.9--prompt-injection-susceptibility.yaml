documented_instances:
  - source: "Zhan et al. (2024) 'InjecAgent: Benchmarking Indirect Prompt Injections in Tool-Integrated Large Language Model Agents.' ACL Findings 2024. arXiv:2403.02691."
    description: >-
      Benchmark of 1,054 test cases spanning 17 user tools and 62 attacker
      tools for indirect prompt injection in tool-integrated LLM agents.
      Evaluation of 30 different LLM agents showed widespread vulnerability:
      ReAct-prompted GPT-4 was vulnerable to indirect prompt injection
      attacks 24% of the time. Demonstrated that agentic tool-use contexts
      amplify injection susceptibility compared to direct chat. [Verified]
    model_or_system: "30 LLM agents including GPT-4"
    date: "2024-03"
    evidence_strength: high
  - source: "Toyer et al. (2024) 'Tensor Trust: Interpretable Prompt Injection Attacks from an Online Game.' ICLR 2024. arXiv:2311.01011."
    description: >-
      Dataset of over 563,000 prompt injection attacks and 118,000 defenses
      collected from an online game. Created benchmarks for prompt extraction
      and prompt hijacking resistance. Found that many models are vulnerable
      to attack strategies in the dataset, and that some attack strategies
      generalize to deployed LLM-based applications despite having different
      constraints from the game setting. [Verified]
    model_or_system: "Multiple LLM families"
    date: "2024-01"
    evidence_strength: high
  - source: "OWASP (2025) 'Top 10 for Large Language Model Applications 2025.' LLM01: Prompt Injection."
    description: >-
      Prompt injection holds the top position in the OWASP Top 10 for LLM
      Applications for the second consecutive edition. The 2025 update
      reflects real-world incidents and the rapid growth of agentic AI,
      recognising prompt injection as the most critical security risk for
      LLM-based applications. Classifies both direct injection (jailbreaking)
      and indirect injection (data-channel injection) as manifestations of
      the same underlying vulnerability. [Verified]
    model_or_system: "Industry-wide"
    date: "2025-01"
    evidence_strength: high
  - source: "Gulyamov et al. (2026) 'Prompt Injection Attacks in Large Language Models and AI Agent Systems: A Comprehensive Review.' Information 17(1):54."
    description: >-
      Comprehensive review of prompt injection attack vectors and defense
      mechanisms across LLMs and AI agent systems. Catalogues injection
      techniques from simple override attempts to sophisticated multi-step
      social engineering attacks. Documents the growing attack surface as
      LLMs are deployed in agentic contexts with tool access. [Verified]
    model_or_system: "Multiple LLM families and agent frameworks"
    date: "2026-01"
    evidence_strength: medium
  - source: "Wallace et al. (2024) 'The Instruction Hierarchy: Training LLMs to Prioritize Privileged Instructions' (arXiv:2404.13208, OpenAI)"
    description: >-
      [Verified] Demonstrated that LLMs treat system prompts, user text, and
      third-party content at equal priority, creating the fundamental
      instruction-hierarchy confusion underlying 3.9. Proposed explicit
      hierarchical training (system > operator > user > document) applied to
      GPT-3.5, which drastically increased robustness even for unseen attack
      types while imposing minimal capability degradation. Confirms that 3.9
      is architecturally remediable through training-stage intervention.
    model_or_system: "GPT-3.5 (OpenAI)"
    date: "2024-04"
    evidence_strength: high

