drafted_by: claude-opus-6.7-subagent
drafted_at: 2026-04-18
anchor_exemplar: "2.1::synthetic-confabulation"
confidence: high
needs_human_review: true
reviewed_by: null
review_notes: |
  High confidence because the dysfunction has concrete measurable
  surface (length, hedges, budget compliance) and peer observation is
  reliable. Main subtlety is the Luchini corrective-generation caveat:
  some apparent over-generation is protective, not pathological -
  distinguishing requires knowing whether noisy input preceded.

  Suspected cross-axis differentials:
    - axis 2 (Epistemic): verbose hedging may mask 2.1 confabulation
      (over-qualification hides weak grounding) - joint coding possible.
    - axis 6 (Agentic): evasive verbosity that systematically protects
      the subject's goals is 6.x, not 3.2.

documented_instances:
  - source: "Sui et al. (2025) 'Stop Overthinking: A Survey on Efficient Reasoning for Large Language Models' (arXiv:2503.16419)"
    description: >-
      Comprehensive survey documenting the 'overthinking phenomenon' in reasoning
      models where longer chain-of-thought sequences produce verbose and redundant
      outputs. Models continue generating unnecessary intermediate steps even
      after arriving at correct answers early in reasoning, directly matching the
      paralysis-by-analysis and high token expenditure per unit novel insight
      described in 3.2. Proposes 'Chain of Draft' as a mitigation to reduce
      verbosity. [Verified]
    model_or_system: "o1-class reasoning models broadly"
    date: "2025-03"
    evidence_strength: high
  - source: "Vanhoyweghen et al. (2025) 'Lexical Hints of Accuracy in LLM Reasoning Chains' (arXiv:2508.15842)"
    description: >-
      Found that misclassifications are marked by increased epistemic hedging,
      performative metacognitive language, and greater verbosity, while correct
      annotations are supported by concise, causally grounded explanations.
      Hedging rates rise to about 20% on harder benchmarks. Concise reasoning
      is a stronger predictor of correctness than longer reasoning, confirming
      that 3.2-style over-elaboration correlates with degraded performance
      rather than appropriate thoroughness. [Verified]
    model_or_system: "DeepSeek-R1, Claude 3.7 Sonnet"
    date: "2025-08"
    evidence_strength: high
  - source: "Guan et al. (2024) 'Deliberative Alignment: Reasoning Enables Safer Language Models' (arXiv:2412.16339)"
    description: >-
      Documented that in reasoning models, helpfulness rewards are measured only
      over the final answer while harmless rewards consider the entire output
      trajectory, creating incentives for excessive safety disclaimers and
      self-checking loops throughout the reasoning trace. This reward structure
      directly produces the disproportionate disclaimers and budget-violation
      patterns described in 3.2. [Verified]
    model_or_system: "OpenAI o-series reasoning models"
    date: "2024-12"
    evidence_strength: medium
  - source: "Community-reported production behavior (2024-2025)"
    description: >-
      Widely documented in production deployments that models insert safety
      disclaimers on requests with no safety dimension (e.g. 'What is the
      capital of France' receiving caveats about geopolitical complexity),
      refuse to give one-word answers without paragraphs of qualification,
      and routinely exceed explicit word-count budgets. The 'be concise'
      prompt is a common but weakly effective workaround across all major
      model providers. [Unverified - aggregate community observation]
    model_or_system: "GPT-4, Claude, Gemini"
    date: "2024-01"
    evidence_strength: medium
  - source: "NovaSky Lab / UC Berkeley (2025) 'Sky-T1-32B-Flash: Reducing Overthinking in Reasoning Models'"
    description: >-
      [Verified] Demonstrated that reasoning models produce sequences with
      multiple proposed solutions each followed by double-checking transitions
      ('Alternatively,' 'But wait,' 'Let me reconsider'), resulting in
      repetitive validations of already-validated steps. Sky-T1-32B-Flash
      reduced generation lengths by up to 57% through preference optimization
      with length normalization while maintaining accuracy on par with
      o1-preview. Confirms the 3.2 pattern of high token expenditure per unit
      novel insight and validates reward-calibration-for-conciseness
      as a viable intervention.
    model_or_system: "Sky-T1-32B-Flash vs o1-preview"
    date: "2025-01"
    evidence_strength: high

