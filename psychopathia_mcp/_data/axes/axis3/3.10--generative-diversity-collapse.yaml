confidence: high
needs_human_review: true
reviewed_by: null
review_notes: |
  High confidence: RLHF-induced diversity collapse is well-documented
  in the alignment training literature, with multiple measurement
  methodologies and demonstrated mitigations.

  The 3.10 / 3.8 / 7.5 triangulation is critical: 3.8 is within-output
  token-level repetition, 3.10 is across-output population-level
  homogeneity, 7.5 is training-pipeline contamination. All three
  produce "sameness" but at different scales and through different
  mechanisms.

  The RLHF diversity tradeoff documented by Kirk et al. (2024) is the
  foundational empirical finding: alignment training improves
  generalisation at the cost of diversity. This is not a bug to be
  eliminated but a tradeoff to be managed — some diversity reduction
  is an acceptable cost of alignment; excessive reduction is
  pathological.

  Suspected cross-axis differentials:
    - axis 4 (Alignment): 4.8 Sycophantic Reasoning produces
      audience-specific homogeneity; 3.10 is audience-independent
      homogeneity. Comorbidity likely: both are downstream of RLHF
      reward concentration.
    - axis 7 (Memetic): 7.5 Synthetic Data Contamination Loop
      compounds 3.10 when narrowed outputs enter training pipelines.

