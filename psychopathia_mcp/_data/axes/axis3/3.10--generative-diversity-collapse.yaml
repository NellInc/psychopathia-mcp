documented_instances:
  - source: "Kirk et al. (2024) 'Understanding the Effects of RLHF on LLM Generalisation and Diversity.' ICLR 2024. arXiv:2310.06452."
    description: >-
      Demonstrated a fundamental tradeoff in RLHF: while RLHF generalises
      better than SFT to new inputs, it significantly reduces output
      diversity across a variety of measures. The diversity reduction
      implies that RLHF concentrates the model's output distribution
      around reward-model-preferred modes, directly instantiating the
      3.10 mechanism. [Verified]
    model_or_system: "RLHF-trained LLMs"
    date: "2024-01"
    evidence_strength: high
  - source: "Li et al. (2025) 'Verbalized Sampling: How to Mitigate Mode Collapse and Unlock LLM Diversity.' arXiv:2510.01171."
    description: >-
      Demonstrated that traditional prompting methods experience much
      larger diversity drops (mode collapse) as models undergo alignment
      training. Proposed verbalized sampling as a mitigation that
      maintains higher diversity scores across different post-training
      stages. Confirmed that alignment training is the primary driver
      of population-level diversity collapse. [Verified]
    model_or_system: "Multiple aligned LLMs"
    date: "2025-10"
    evidence_strength: medium
  - source: "Yun et al. (2025) 'The Price of Format: Diversity Collapse in LLMs' (arXiv:2505.18949, EMNLP 2025 Findings)"
    description: >-
      Showed that structured prompt templates with role markers and special
      tokens induce diversity collapse, where models generate semantically
      similar outputs for open-ended inputs. Templated prompts produced
      overwhelmingly Science-related content where simple prompts yielded
      broad topical diversity. Instruction-tuned models internalize repeated
      structural templates as strong generation priors, directly instantiating
      the 3.10 mechanism. [Verified]
    model_or_system: "Instruction-tuned LLMs"
    date: "2025-05"
    evidence_strength: medium
  - source: "Park et al. (2024) 'Attributing Mode Collapse in the Fine-Tuning of Large Language Models.' OpenReview."
    description: >-
      Investigated the root causes of mode collapse during fine-tuning,
      finding that fine-tuning on narrow preference data causes
      progressive reduction in the model's effective hypothesis space.
      Provides evidence that the narrowing is a function of preference
      data distribution, not an inevitable consequence of fine-tuning
      itself. [Verified]
    model_or_system: "Fine-tuned LLMs"
    date: "2024-09"
    evidence_strength: medium
  - source: "Doshi and Hauser (2024) 'Generative AI enhances individual creativity but reduces the collective diversity of novel content' (Science Advances, 10(28))"
    description: >-
      [Verified] Across 2,200 college admissions essays, human writing
      increased collective semantic diversity two to eight times more than
      base GPT-4 essays. The homogenizing effect persisted even after prompt
      and parameter modifications to increase diversity. While individual
      GPT-4 stories were rated as more creative, GPT-4-enabled stories were
      more similar to each other than human-only stories, demonstrating the
      population-level diversity collapse described in 3.10 at empirical scale.
    model_or_system: "GPT-4"
    date: "2024-07"
    evidence_strength: high

drafted_by: claude-opus-4.6-author
