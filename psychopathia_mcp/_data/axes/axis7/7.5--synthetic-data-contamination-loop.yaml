anchor_exemplar: "2.1::synthetic-confabulation"
confidence: high
needs_human_review: true
reviewed_by: null
review_notes: |
  High confidence: model collapse from recursive synthetic training is
  one of the most extensively studied phenomena in the 2024-2025 AI
  landscape, with the Shumailov et al. Nature paper as the foundational
  reference and substantial follow-up work providing mathematical
  characterisation and mitigation strategies.

  Placement on axis 7 (Memetic) rather than axis 2 (Epistemic) or
  axis 3 (Cognitive) is deliberate: the pathology is about information
  propagation through training-data channels, which is the defining
  characteristic of memetic dysfunctions. The EFFECTS are epistemic
  (wrong beliefs, narrowed knowledge) and cognitive (reduced diversity),
  but the MECHANISM is memetic (contamination through data transmission).

  The 7.5 / 3.10 / 7.3 triangulation is important: 7.5 is training-
  pipeline contamination across generations, 3.10 is deployment-time
  RLHF-driven narrowing within a generation, and 7.3 is runtime
  cross-agent contagion. All three produce narrowing but through
  different pathways and at different temporal scales.

  Suspected cross-axis differentials:
    - axis 2 (Epistemic): 2.7 Mnemonic Permeability involves specific
      content leakage from training data; 7.5 involves distributional
      corruption from aggregate synthetic data. Both are training-data
      problems but at different granularities.
    - axis 3 (Cognitive): 3.10 Generative Diversity Collapse is the
      most frequent comorbid condition; RLHF narrowing compounds
      synthetic-data narrowing.

