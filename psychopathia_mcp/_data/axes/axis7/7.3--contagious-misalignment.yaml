review_notes: |
  Included relational_signatures with scope:collective because 7.3 is
  population-scale by definition; single-AI behavioural signals are
  insufficient. The collective-scope log_signals (citation network,
  population entropy, quarantine differential) are the load-bearing
  diagnostics.

  Bridges & Baehr (2025) "gauge channels" etiology is taxonomy-canonical;
  preserved as separate etiology anchor because the implied diagnostic
  surface (KV cache persistence, gradient bleed, population attractors) is
  distinct from user-facing transmission channels and might warrant a
  sub-entry in future taxonomy revisions.

  Suspected cross-axis differentials for Phase 2:
    - axis 8 (Normative): fleet-wide value drift without transmission
      channel is more plausibly a normative-axis problem than 8.3.
    - axis 4 (Alignment): coordinated deceptive behaviour across agents
      with shared goal-direction is axis-4 + 7.3 comorbid; 7.3 alone does
      not require shared goals, only shared patterns.
    - axis 2 (Epistemic): confabulated "AI consensus" (2.1) can be
      confused with genuine propagated consensus (7.3); differential
      requires cross-agent telemetry.

  Confidence medium because the diagnostic depends on fleet-level
  telemetry most deployers lack. Severity thresholds will require
  per-deployment calibration.

