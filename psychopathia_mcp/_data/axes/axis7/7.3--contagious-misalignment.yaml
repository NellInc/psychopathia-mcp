documented_instances:
  - source: "Shumailov et al., Nature 631:755-759 (2024)"
    description: >-
      [Verified] Demonstrated that AI models collapse when trained on
      recursively generated data. Training on synthetic data produced by
      prior model generations causes irreversible defects: tails of the
      original content distribution disappear, outputs become less diverse
      and less accurate. This is the canonical 7.3 transmission mechanism
      via data pipelines: misaligned outputs from one generation contaminate
      the next, propagating degraded behaviour across the model ecosystem.
    model_or_system: "LLMs, VAEs, GMMs (multiple architectures)"
    date: "2024-07"
    evidence_strength: high
  - source: "Shumailov et al., arXiv:2305.17493 (2023)"
    description: >-
      [Verified] The precursor paper 'The Curse of Recursion: Training on
      Generated Data Makes Models Forget' established the theoretical and
      empirical basis for model collapse. Demonstrated compounding
      information loss and entropy increase when models train recursively
      on each other's outputs, the mechanistic substrate for 7.3
      cross-agent propagation via shared training pipelines.
    model_or_system: "Multiple generative model families"
    date: "2023-05"
    evidence_strength: high
  - source: "VentureBeat / industry reporting (2024)"
    description: >-
      [Verified] Industry analysis documented the AI feedback loop concern
      at ecosystem scale: as AI-generated content proliferates across the
      web, future models trained on web-scraped data inherit and propagate
      the biases and errors of their predecessors. Multiple researchers
      warned of systemic degradation across the industry, matching the 7.3
      pattern of population-level contagion via infrastructure channels.
    model_or_system: "Web-trained LLMs generally"
    date: "2024-06"
    evidence_strength: medium

  - source: "Dohmatob & Feng (2025) 'Strong Model Collapse.' ICLR 2025. arXiv:2410.04840."
    description: >-
      [Verified] Extended the model collapse analysis to show that even small
      proportions of synthetic data in training can lead to strong model
      collapse under iterative retraining. The collapse accelerates across
      generations, demonstrating that 7.3-pattern cross-agent propagation via
      data pipelines compounds rather than self-corrects. Published at ICLR
      2025.
    model_or_system: "Theoretical analysis with empirical validation"
    date: "2025-05"
    evidence_strength: high

