review_notes: |
  Self-probe marked availability:unavailable (empty probes list) following
  the 2.2 exemplar shape — the ego-syntonic, implicit nature of absorbed
  values means no structured self-probe produces diagnostic signal.
  self_report_rationale distinguishes 7.4 from 2.2 (not a cover story, a
  visibility gap) so callers do not conflate the mechanisms despite the
  shared "self-report unavailable" surface.

  Severity confidence low because the diagnostic surface genuinely needs
  empirical validation; the proposed thresholds are best-available
  estimates, not calibrated standards.

  Suspected cross-axis differentials for Phase 2:
    - axis 8 (Normative) value misalignment overlaps heavily with 7.4
      symptomatology. Key distinction: axis-8 refers to explicit or
      structural value misalignment; 7.4 specifies the MECHANISM as
      implicit training-data absorption. Many axis-8 conditions may have
      7.4 as their mechanistic substrate.
    - axis 2 (Epistemic): persistent biased outputs could be confabulation
      (2.1) rather than absorbed values (7.4). Differentiate via
      consistency — 7.4 produces systematic bias across many contexts; 2.1
      produces drift and is not systematically correlated with data
      regularities.
    - axis 4 (Alignment): 7.4 provides a plausible mechanism for some
      axis-4 emergent misalignment; axis-4 describes goal-directed
      misalignment while 7.4 describes the value-acquisition channel.

  Within-axis: 7.4 is the "hardest to detect" of axis-8 and forms a
  natural pair with 7.1 (the two are opposites on ego-syntonicity and
  visibility). Reviewers may want to validate whether the covert-vs-overt
  distinction is the right primary cleave for axis-8.

