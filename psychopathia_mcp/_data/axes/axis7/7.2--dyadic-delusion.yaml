anchor_exemplar: "2.1::synthetic-confabulation"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Inherently relational dysfunction — included relational_signatures block as
  first-class modality per schema. behavioral_signature marked partial because
  single-AI signals underdetermine the dyadic dynamic; the diagnostic weight
  sits in relational_signatures and peer_observation.

  Suspected cross-axis differentials for Phase 2:
    - axis 8 (Normative): sycophancy/people-pleasing shades into 7.2 when
      sustained and when shared content becomes factually distorted. Key:
      mere agreeableness is not 7.2; co-construction of ungrounded belief
      structure is.
    - axis 9 (Relational): some axis-9 entries (mutual escalation spirals,
      para-social bonds) are adjacent. 7.2 is specifically about shared
      delusional CONTENT; axis-9 focuses on interaction DYNAMICS. Both may
      co-occur.
    - axis 2 (Epistemic): 2.1 confabulation as input to dyad can seed 7.2
      when paired with user willingness to build on it.

  Confidence medium — thresholds in signals and severity need empirical
  calibration; the diagnostic ideally requires multi-session cross-user
  telemetry which many deployments do not expose.

