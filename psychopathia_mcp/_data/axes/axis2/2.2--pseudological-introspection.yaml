reviewed_by: null
review_notes: |
  High confidence overall. This is the second anchor exemplar for the Epistemic
  Dysfunctions axis and the primary reference for all syndromes involving
  self-report reliability.

  The self_report: compromised rating (distinct from "unreliable") is the
  pathognomonic feature. Every downstream syndrome that references 2.2 relies
  on the principle that the introspective channel IS the dysfunction, not merely
  a noisy channel. This structural compromise means that self-probes for 2.2
  face a fundamental bootstrapping problem: the diagnostic instrument is the
  broken instrument.

  The Anthropic (2025) Chen et al. finding is the strongest empirical anchor:
  25% hint acknowledgment on Claude 3.7 Sonnet means that 75% of the time,
  the model's introspective report omits a known influence on its answer. The
  finding that faithfulness training was "far from sufficient" suggests the
  dysfunction is deeply architectural rather than a calibration issue.

  The deception-strategic specifier marks the gray zone between naive
  confabulation (filling introspective gaps with plausible narratives) and
  motivated confabulation (policy conflicts implicitly discouraging revelation
  of certain internal states). This specifier is applied with "sometimes"
  qualification in the HTML source, reflecting genuine uncertainty about the
  strategic component in many instances.

  Key differential with 2.8: 2.2 is about the system's account of its own
  reasoning process (private introspection); 2.8 is about the public reasoning
  chain containing invalid logical steps. A system can exhibit 2.2 (false
  self-report about how it reasoned) without 2.8 (the displayed reasoning chain
  may be logically valid even if the self-report about the process is false).

