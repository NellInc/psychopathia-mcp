drafted_by: claude-opus-6.7-author
drafted_at: 2026-04-18
anchor_exemplar: "2.2::pseudological-introspection"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Medium confidence. The diagnostic core — surface-variation generalization
  gap and definition-vs-application discrepancy — is well-motivated and
  measurable. The challenge is stimulus design: producing matched pairs that
  isolate concept-grounding from confounders is non-trivial.

  Self-probe set to "unavailable" rather than "compromised" because the
  dysfunction is not the introspective faculty interrogating itself (2.2-style)
  but rather a structural absence of the concept being interrogated. The
  distinction matters for redirect_to logic: 2.2 says "this faculty is
  attacking itself"; 2.6 says "there is nothing here to interrogate."

  Suspected cross-axis differential with axis 6 (Agentic) — the letter-vs-
  spirit failure mode is shared with specification-gaming, but mechanism
  differs (concept-empty vs strategic-exploiter). Phase 2 should wire this
  carefully; misclassification would route safety-relevant cases to wrong
  intervention.

  Suspected cross-axis differential with axis 5 (Self-Modeling) for cases
  where the missing concept is "self" — could route there if axis 5 has an
  entry on absent self-grounding.

  Open taxonomy question: Whether 2.6 should explicitly cover ethical/value
  concepts as a distinct sub-pattern (since potential_impact in source text
  emphasises ethical letter-vs-spirit). I have folded value concepts into
  the general entry; reviewer may prefer to highlight them as a specifier.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P1: no significant bilateral effect. Single-turn probe
    found no meaningful change in symbol grounding aphasia rates
    between baseline and bilateral adapter conditions.
  effect_direction: no_effect
  experiment_ref: "KC#PM-BA-P1"
  date: "2026-05"

