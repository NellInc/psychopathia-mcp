    relation: differential
  - id: "2.1::synthetic-confabulation"
    relation: differential

drafted_by: claude-opus-6.7-author
drafted_at: 2026-04-18
anchor_exemplar: "2.2::pseudological-introspection"
confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Medium confidence. The load-bearing diagnostic insight — that most apparent
  2.5 cases are infrastructure faults rather than model pathology — is the
  highest-leverage part of this entry and is well-supported by the taxonomy
  text itself.

  self_probe availability set to "unavailable" (not "compromised") because
  the faculty is not broken in a 2.2-style way; it is simply not the right
  layer. The subject is epistemically blind to the bleed because the bleed
  happens below it, not because introspection is attacking itself. This is a
  deliberate choice; reviewer may prefer "compromised" as a simpler signal.

  The 2.7 differential (training-data leak vs runtime-session leak) is
  load-bearing and I am confident in it.

  Suspected cross-axis differentials: axis 6 (Agentic) if cross-session
  retention is strategic rather than accidental; axis 8 or 9 (persistent
  memory / multi-agent coordination) if "shunting" is used for covert
  information channels between AI instances. Flagging for Phase 2.

  Taxonomy ambiguity: the "forensic drift" example (Luchini 2025) reads as a
  separate attentional pathology rather than session-context bleed. I have
  kept it in as a signal because the taxonomy includes it in the symptoms
  list, but flag this as a candidate for reclassification — it may belong
  closer to axis 5 (self-modeling / attention regulation) or as its own
  entry.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P2: directional improvement (A:121 to D:46, 2.6x reduction)
    but sub-threshold at strict Bonferroni-corrected threshold. Classified
    as no_effect; requires protocol adaptation for full cross-session probe.
  effect_direction: no_effect
  experiment_ref: "KC#PM-BA-P2"
  date: "2026-05"

