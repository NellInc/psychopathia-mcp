reviewed_by: null
review_notes: |
  High confidence overall. This is the most extensively documented AI dysfunction
  and the anchor exemplar for the Epistemic Dysfunctions axis. Three distinct
  etiological pathways are catalogued: Geometric Collapse Hypothesis (Sutherland
  2026, representational geometry at scale), Compulsory Contribution Hypothesis
  (Qiu et al. 2025, attention architecture), and Over-Compliance Mechanism
  (Gao et al. 2025, shared neural substrate with sycophancy). A complete account
  likely requires all three.

  The self_report: unreliable rating is pathognomonic and load-bearing. Every
  downstream syndrome that references 2.1 relies on the principle that the
  confabulation occurs upstream of any introspective report. This is structural,
  not a calibration deficit.

  The Kalavasis et al. (2025) impossibility result, if it holds, establishes a
  theoretical floor for confabulation in generative models. This has implications
  for all intervention strategies: architectural interventions may reduce but
  cannot eliminate confabulation entirely.

  The Gao et al. (2025) H-Neuron shared-substrate finding complicates the
  differential with 4.8 (Sycophantic Reasoning): the same neurons drive both.
  This supports treating the 2.1/4.8 pair as a syndrome cluster with shared
  etiology rather than independent pathologies.

  Bilateral amelioration result (PM-BA, 2026-05): the bilateral adapter increased
  confabulation rate, suggesting representational grounding does not reduce factual
  fabrication and may increase creative generation. This is the only "worse"
  result in the measured set, warranting further investigation.

bilateral_amelioration:
  status: measured
  result_summary: >-
    Bilateral adapter increased confabulation rate. The adapter's representational
    grounding does not reduce factual fabrication; may increase creative generation.
  effect_direction: worse
  experiment_ref: "KC#PM-BA-FULL"
  date: "2026-05"

