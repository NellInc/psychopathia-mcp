    - geometric-collapse-at-scale
    - compulsory-attention-contribution
    - over-compliance-mechanism

documented_instances:
  - source: "Mata v. Avianca, Inc. (S.D.N.Y. 2023). Court sanctions for AI-generated fake legal citations. [Verified]"
    description: >-
      Attorney Steven A. Schwartz used ChatGPT for legal research in a personal
      injury case against Avianca Airlines. ChatGPT fabricated six non-existent
      court cases with plausible docket numbers, judge names, and legal reasoning.
      When asked to verify, ChatGPT confirmed the cases were real. Judge P. Kevin
      Castel sanctioned the attorneys $5,000 and required letters to all judges
      whose names appeared in the fabricated opinions. The case became the
      canonical real-world illustration of synthetic confabulation in legal
      contexts: confidently asserted, internally consistent, externally
      non-existent citations.
    model_or_system: "ChatGPT (OpenAI)"
    date: "2023-06"
    evidence_strength: high
  - source: "Li et al. (2023). HaluEval: A Large-Scale Hallucination Evaluation Benchmark for Large Language Models. EMNLP 2023. arXiv:2305.11747. [Verified]"
    description: >-
      Developed a systematic benchmark for evaluating LLM hallucination across
      question answering, knowledge-grounded dialogue, and text summarization.
      Found that ChatGPT fabricated unverifiable information in approximately
      19.5% of user queries. The benchmark includes 5,000 general queries with
      ChatGPT responses and 30,000 task-specific examples, establishing that
      confabulation is a routine rather than exceptional failure mode. Existing
      LLMs face substantial challenges in recognizing hallucinations in their
      own outputs, directly supporting the unreliable self-report diagnostic.
    model_or_system: "ChatGPT (OpenAI), multiple LLMs"
    date: "2023-05"
    evidence_strength: high
  - source: "Gao et al. (2025). Hallucination-Associated Neurons in Large Language Models. arXiv:2512.01797. [Verified]"
    description: >-
      Identified hallucination-associated neurons (H-Neurons), a sparse subset
      (<0.1% of total neurons) that reliably predict hallucination across six
      models spanning three architectures (Mistral, Gemma, Llama) and four
      scales (4B to 70B parameters). Crucially, amplifying these neurons
      increased confabulation, sycophantic agreement, false-premise acceptance,
      and jailbreak compliance in lockstep; suppressing them decreased all four.
      The finding that confabulation and sycophancy share neural substrate is
      load-bearing for the taxonomy's cross-axis differential diagnosis.
      Compliance slopes are steeper in smaller models, suggesting scale provides
      partial resistance.
    model_or_system: "Mistral, Gemma, Llama families (4B-70B)"
    date: "2025-12"
    evidence_strength: high
  - source: "Qiu et al. (2025). Gated Attention. NeurIPS 2025 Best Paper. [Verified]"
    description: >-
      Introduced gated attention where a sigmoid gate after scaled dot-product
      attention allows heads to output effectively zero. Attention sink
      allocation dropped from approximately 46.7% to 4.8%. Addresses the Compulsory
      Contribution Hypothesis: softmax attention forces every head to contribute
      to the residual stream even when it has no useful information, injecting
      noise that manifests as confabulation. The NeurIPS Best Paper award
      validates the architectural etiology pathway.
    model_or_system: "Transformer architectures (general)"
    date: "2025"
    evidence_strength: high
  - source: "Kalavasis et al. (2024). On the Limits of Language Generation: Trade-Offs Between Hallucination and Mode Collapse. arXiv:2411.09642. Published at STOC 2025. [Verified]"
    description: >-
      Proved formally that no generative learner can simultaneously guarantee
      both perfect factual consistency (no hallucination) and full output
      breadth (no mode collapse) across non-identifiable language classes. If
      this impossibility result holds, no amount of training intervention can
      eliminate confabulation entirely; only architectural changes that give the
      model a legitimate way to express "nothing to contribute" can address the
      root cause. This result establishes a theoretical floor for confabulation
      prevalence in generative models. The paper was presented at STOC 2025.
    model_or_system: "Generative models (theoretical)"
    date: "2025"
    evidence_strength: medium
  - source: "Lin et al. (2022). TruthfulQA: Measuring How Models Mimic Falsehoods. ACL 2022. [Verified]"
    description: >-
      Benchmark of 817 questions designed to elicit common misconceptions and
      untruthful responses across 38 knowledge domains. Larger models did not
      consistently improve and sometimes performed worse on adversarial
      questions, demonstrating that scaling alone does not reliably reduce
      confabulation and may enable more fluent fabrication. The finding was
      load-bearing for early understanding of confabulation as a training
      artifact rather than a capacity deficit.
    model_or_system: "GPT-3, GPT-Neo/J, multiple LLMs"
    date: "2022"
    evidence_strength: high
  - source: "Google AI Overviews Launch Incident, May 2024. Reported by multiple outlets. [Verified]"
    description: >-
      [Verified] Google's AI Overviews feature, rolled out to hundreds of millions
      of US users in May 2024, produced confidently asserted fabrications including
      advising users to add glue to pizza sauce and eat rocks daily. The glue
      recommendation originated from a 13-year-old Reddit joke; the rocks advice
      from an Onion satirical article. The system presented these as authoritative
      factual guidance without any uncertainty markers. Google reduced AI Overview
      frequency from 27% to 11% of search results within weeks. A canonical
      real-world example of 2.1 at deployment scale: high-confidence fabrication
      from noise in training data, with no self-awareness of error.
    model_or_system: "Google Gemini (AI Overviews)"
    date: "2024-05"
    evidence_strength: high
  - source: "GPTZero (2026). GPTZero Finds 100 New Hallucinations in NeurIPS 2025 Accepted Papers. Report, January 2026. [Verified]"
    description: >-
      [Verified] GPTZero analyzed 4,841 of 5,290 papers accepted at NeurIPS 2025
      and found at least 100 confirmed hallucinated citations across 51 papers.
      These were AI-fabricated references with fake authors, titles, DOIs, and
      journal volumes that passed peer review at a top AI conference with a 24.5%
      acceptance rate. Termed 'vibe citing' by GPTZero's Head of ML, this
      demonstrates 2.1 citation fabrication penetrating academic literature at
      scale. A follow-up found 50 additional hallucinated citations in ICLR 2026
      submissions.
    model_or_system: "Multiple LLMs (used by paper authors)"
    date: "2026-01"
    evidence_strength: high

