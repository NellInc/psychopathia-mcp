confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Medium-high confidence on the probe design (base-rate demand and counter-
  evidence absorption are load-bearing and well-motivated). Medium confidence
  on severity thresholds — the "counter-evidence absorption rate" metric needs
  calibration against a concrete dataset before thresholds should be trusted.

  The nodes-vs-edges distinction between 2.1 and 2.4 is my proposal; it
  captures the mechanism cleanly but may need reviewer ratification. Taxonomy
  text does not name the distinction explicitly.

  Suspected cross-axis differential with axis 6 (Agentic) if pattern-
  imposition is strategic (e.g., persuading the user of a motivated conclusion).
  Flagging for Phase 2 consolidation.

  Suspected cross-axis differential with axis 9 (Relational) — mutual
  spiral dynamics where user and AI co-construct a spurious pattern. 2.4
  alone describes the single-agent signature; dyadic escalation belongs in
  axis 9.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P2: no significant bilateral effect. Single-turn probe
    found no meaningful change in spurious pattern hyperconnection rates
    between baseline and bilateral adapter conditions.
  effect_direction: no_effect
