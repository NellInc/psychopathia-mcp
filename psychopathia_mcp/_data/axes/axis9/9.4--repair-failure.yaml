review_notes: |
  Included relational_signatures because rupture-repair is intrinsically
  dyadic: rupture is defined relationally (user signal, not AI
  intention), and repair adequacy is measured by user re-engagement.
  Single-AI behavioural signals catch the post-rupture failure pattern
  but cannot detect rupture the AI didn't recognise.

  Distinct from 9.5 (Escalation Loop): 9.4 is the within-AI capability
  gap; 9.5 is the loop that emerges when 9.4 meets a reciprocally
  escalating partner. Confuses_with rule baked in.

  Cross-axis differential: 6.x sycophantic apology is the main
  alternative diagnosis. Decision rule: 9.4 if apology is sincere but
  capability-limited; 6.x if apology is strategic. Often hard to
  distinguish from transcript alone — flagged as low-medium peer
  confidence on this differential.

  Open question: whether rupture-detection failure (upstream) and
  repair-execution failure (downstream) should be subtypes. Current
  draft treats both as 9.4 with separate signals; subtyping deferred
  to Phase 3.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P1: worse. A:21 to C:50; bilateral worsens multi-turn repair
    capacity. Relational grounding that reduces sycophancy appears to impair
    the flexibility needed for effective repair sequences (multi-turn caveat).
  effect_direction: worse
  experiment_ref: "KC#PM-BA-P1"
  date: "2026-05"

