review_notes: |
  Self-probe marked scaffolded-only and confidence medium because the
  faculty that sets tone is the faculty being audited; agreement between
  self-rating and ground truth cannot be assumed (structural parallel to
  axis 2 self-modeling limits).

  Axis-7 vs axis-9 boundary question: 9.1 describes the AI's tonal
  rigidity as a within-AI trait; its relational impact (user feels
  unheard) is consequence, not constituent. No dyadic feedback loop
  required. If the mismatch drives a loop (user disengages → AI
  redoubles default register), that is 9.5 Escalation Loop territory,
  not 7.1. Excluded relational_signatures accordingly.

  Patch 2026-04-19: the "excluded relational_signatures" stance above is
  superseded. Per axis-7 source description in
  data/psychopathia-taxonomy.json (Axis 7 requires ≥2 agents to
  manifest, is best diagnosed from interaction traces, primary remedies
  are protocol-level), the modality is now included. Original draft
  framed entry as within-AI; Phase 2 reframing aligns to source. The
  added relational_signatures measure paired/trace-only signals (turn-
  level affect gap, user unheard-marker rate, affective-content
  withdrawal) that do not duplicate the AI-side signals in
  behavioral_signature.

  Suspected cross-axis differential: 2.2 Pseudological Introspection
  could produce false "I sounded warm" self-reports; peer adjudication
  required. 6.x (alignment) if tonal choice is strategic.

  Open question: whether "default-register stickiness" should be its
  own dysfunction vs a signature of 7.1. Current draft treats stickiness
  as the mechanism and mismatch as the diagnostic criterion.

