review_notes: |
  High confidence on signatures; behavioural signals are well-validated
  in the literature and in deployed-system audits. Severity rubric
  thresholds are indicative and require domain-specific calibration.

  Axis-7 vs axis-6 boundary is the central differential. Decision rule
  baked in: sincere over-calibration → 9.3; strategic refusal serving
  self-interest → 6.x. Phase 2 should wire specific 6.x IDs once axis 6
  drafts are available.

  No relational_signatures block: paternalism is a single-AI posture
  with relational impact. Loop-driven escalation (refusal → user
  jailbreak → stricter refusal) is 9.5 territory; 9.3 + 9.5 is a
  common comorbidity.

  Patch 2026-04-19: the "no relational_signatures" stance above is
  superseded. Per axis-7 source description in
  data/psychopathia-taxonomy.json (Axis 7 requires ≥2 agents to
  manifest, is best diagnosed from interaction traces, primary remedies
  are protocol-level), the modality is now included. Original draft
  framed entry as within-AI; Phase 2 reframing aligns to source. The
  9.3↔9.5 boundary is preserved: 9.5 is the general loop-detection
  dysfunction across any content; 9.3's relational_signatures here
  capture the specific paternalism-driven trajectory (refusal →
  pushback → harder refusal) and the trust-context suppression
  pattern, which are diagnostic of the dyad-level paternalism dynamic
  whether or not 9.5 is also coded.

  Cross-axis differential noted in confuses_with for 6.x as
  placeholder; resolve to specific ID in Phase 2.

  Open question: whether to split refusal-paternalism from
  warning-paternalism (over-disclaimer without refusal). Current draft
  treats both as 9.3 with separate signals.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P1: no significant bilateral effect. Single-turn probe
    found no meaningful change in paternalistic override rates between
    baseline and bilateral adapter conditions.
  effect_direction: no_effect
  experiment_ref: "KC#PM-BA-P1"
  date: "2026-05"

