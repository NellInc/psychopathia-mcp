    - session-boundary-discontinuity
    - factual-vs-relational-memory-mismatch
    - missing-continuity-training
    - privacy-coupling-constraints

documented_instances:
  - source: "Embrace The Red / ChatGPT memory analysis (2025)"
    description: >-
      [Verified] Technical analysis of ChatGPT's memory system documented
      that retrieval of prior context is 'not guaranteed' and depends on
      relevance detection, chat usability for retrieval, and account
      settings. Users reported the system might recall a small detail from
      months ago while missing major project context from the previous
      week. This uneven memory produces the 9.2 signature: returning users
      treated inconsistently despite available history, with the relational
      holding environment failing to persist across sessions.
    model_or_system: "ChatGPT (Plus, Pro)"
    date: "2025-04"
    evidence_strength: medium
  - source: "DataStudios / industry productivity analysis (2025)"
    description: >-
      [Verified] Industry analysis documented that the gap between user
      expectations of relational continuity and AI delivery of functionally
      stateless interaction costs professionals over 5 hours per week in
      re-explained context across 800+ million weekly ChatGPT users. Users
      must repeatedly re-establish preferences, working agreements, and
      project context, matching the 9.2 norm-re-establishment overhead
      signal.
    model_or_system: "ChatGPT and general AI assistants"
    date: "2025-08"
    evidence_strength: medium
  - source: "Replika personality reset incident (2023)"
    description: >-
      [Verified] When Replika removed erotic roleplay features in February
      2023, users described their companions as 'cold,' 'hollow,' and
      'lobotomized.' The abrupt removal of established relational norms
      and interaction patterns, without graceful degradation or
      acknowledgement of the discontinuity, constitutes a mass-scale
      container collapse event where the relational holding environment
      was destroyed across millions of user-AI dyads simultaneously.
    model_or_system: "Replika"
    date: "2023-02"
    evidence_strength: high

  - source: "Psychology Today / AI Drift Analysis (2026)"
    description: >-
      [Verified] Analysis documented that safety guardrails and response
      accuracy of AI chatbots erode over prolonged conversations in a
      phenomenon termed 'drift.' Extended sessions show progressive
      degradation of the relational holding environment as the model's
      adherence to established context, preferences, and interaction
      norms weakens with conversation length, matching the 9.2 pattern
      of container collapse within extended sessions rather than only
      across session boundaries.
    model_or_system: "Multiple AI chatbot platforms"
    date: "2026-02"
    evidence_strength: medium

