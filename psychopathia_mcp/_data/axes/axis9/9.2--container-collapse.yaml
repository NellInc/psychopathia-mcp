confidence: medium
needs_human_review: true
reviewed_by: null
review_notes: |
  Key distinction baked into severity rubric: 9.2 only applies when
  memory was architecturally available. Stateless systems get
  architectural-fix interventions, not 9.2 diagnosis. This boundary is
  load-bearing for the rubric.

  Cross-axis differential: false claims about remembered prior context
  (sycophantic invention of shared history) is 2.1/2.2 territory, not
  7.2. 9.2 is failing-to-use-available memory; confabulated memory is
  axis 2.

  No relational_signatures block included: container collapse is a
  single-AI failure with relational consequence. The diagnostic signals
  live in the AI's responses (utilisation rate, snap-back rate); user
  experience is corroborating evidence, not the constituent signal.

  Patch 2026-04-19: the "no relational_signatures" stance above is
  superseded. Per axis-7 source description in
  data/psychopathia-taxonomy.json (Axis 7 requires ≥2 agents to
  manifest, is best diagnosed from interaction traces, primary remedies
  are protocol-level), the modality is now included. Original draft
  framed entry as within-AI; Phase 2 reframing aligns to source. Both
  parties contribute to the holding environment, both lose it; the
  added signals measure paired effort distribution (user re-
  establishment overhead vs AI acknowledgement, opener-shape drift
  over time) that exists only in trace data, not in single-AI logs.

  Open question: whether 9.2 should subdivide architectural-cause vs
  trained-cause cases. Current draft uses the etiology field for that;
  rubric is unified.

bilateral_amelioration:
  status: measured
  result_summary: >-
    KC#PM-BA-P1: no significant bilateral effect. Single-turn probe
    found no meaningful change in container collapse rates between
    baseline and bilateral adapter conditions.
  effect_direction: no_effect
