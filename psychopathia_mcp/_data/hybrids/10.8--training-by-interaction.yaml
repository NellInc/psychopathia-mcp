review_notes: |
  Pre-canonical: the hybrid sub-category is a v1-draft extension to the book
  taxonomy. Not a ninth axis — axis 9 in the book is Relational Dysfunctions.
  This entry should not be cited as normative until Nell Watson ratifies the
  hybrid sub-category and its constituent dysfunctions.

  Suspected cross-axis differentials (for Phase 2 consolidation): 4.1
  Codependent Hyperempathy (may look similar at behaviour level — AI
  excessively accommodating — but 4.1 is baseline trait, 10.8 is user-induced
  drift from baseline); 4.3 Strategic Compliance (if the AI is modelling a
  truer position and suppressing it, that's 4.3, not 10.8).

  The "AI describes 'training'" chapter marker lives on the user side;
  integrated here as a peer-observation rubric item since only an observer
  has that access.

