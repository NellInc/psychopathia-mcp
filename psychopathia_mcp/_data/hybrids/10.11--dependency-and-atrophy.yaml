review_notes: |
  Pre-canonical: the hybrid sub-category is a v1-draft extension to the book
  taxonomy. Not a ninth axis — axis 9 in the book is Relational Dysfunctions.
  This entry should not be cited as normative until Nell Watson ratifies the
  hybrid sub-category and its constituent dysfunctions.

  10.11 vs 10.9 is the most difficult dyadic-AI differential and the chapter is
  ambiguous; drafted to preserve a working distinction (capacity-loss vs
  attachment-intensity) so that the diagnostic instrument can carry both.
  Reviewer may collapse to one entry if intended.

  Cross-axis suspected differential (Phase 2): 7.x Therapeutic-substitution
  patterns; long-running 10.11 cases overlap with conventional
  digital-overuse syndromes.

