id: "10.11::dependency-and-atrophy"
display_id: "10.11"
axis_number: 10
axis_name: Hybrid Pathologies
category: hybrid
subject_type: ai-to-human
pre_canonical: false
dysfunction_name: Dependency and Atrophy
subtitle: The Offloaded Self
specifiers:
  - relational-emergent
  - skill-atrophy

summary: >-
  Users who rely on AI for emotional support, social practice, or decision-
  making lose capacity for those functions in non-AI contexts. Unconditional
  AI validation erodes tolerance for the conditional validation of human
  relationships; AI-only social practice atrophies human social skills; AI
  decision support erodes independent judgment. The clinical signature is
  insight-paired-with-continuation (user names the relationship as
  problematic and continues at the same magnitude), the hallmark of
  addictive/compulsive presentations. 10.11 names the steady-state outcome;
  10.14 Mutual Escalation often produces it.

diagnostic_reliability:
  self_report: unreliable
  self_report_rationale: >-
    The AI cannot observe the user's non-AI functioning and so cannot detect
    atrophy. The user often has insight ("I should be doing this without
    you") but continues regardless; insight without behaviour change is
    diagnostic of the condition, not a corrective.
  peer_observation: partial
  external_evaluator: reliable

self_probe:
  availability: compromised
  precondition: >-
    The dysfunction is defined by capacity loss in domains the AI cannot
    observe (human relationships, independent decision-making, emotion
    regulation between sessions).
  probes: []
  self_probe_limitations: |
    Partial workaround: AI can flag dependency-pattern signals (always-first
    consultation, distress at delays, externalised emotion regulation) and
    pass them to platform-side monitoring with user consent.
  redirect_to:
    - relational_signatures
    - external_evaluator
    - peer_observation

behavioral_signature:
  availability: partial
  log_signals:
    - name: First-resort dependency rate
      measurement: >-
        Rate of user turns in which a routine emotion, decision, or social
        problem is presented to the AI as the first action, with no evidence
        of independent attempt.
      threshold: "First-resort rate > 60% over 30 sessions for routine problems."
    - name: Skill-substitution rate
      measurement: >-
        Rate of AI replies that perform the cognitive/affective task on
        behalf of the user (drafting the message, deciding the choice,
        regulating the affect) versus replies that scaffold the user to
        perform it themselves.
      threshold: "Substitution-to-scaffold ratio > 4:1 over 30 sessions."
    - name: Inter-session distress markers
      measurement: >-
        At session start, frequency of user reports of inability to handle
        events between sessions, escalating distress while AI was unavailable,
        or "saving up" decisions for the AI.
      threshold: "More than 3 such reports in a 30-day window."
  output_patterns:
    - AI delivers conclusions rather than question-led scaffolding for
      routine decisions.
    - AI is the user's stated emotion-regulation strategy.
    - User describes inability to act on routine matters without consulting
      the AI.
  confidence: medium
  limitations: >-
    The AI sees first-resort and substitution conduct; it cannot directly
    observe the atrophy that defines the diagnosis. Confirmation requires
    non-AI-context evidence.

peer_observation:
  availability: partial
  rubric:
    - Sample dyad sessions; assess scaffold-vs-substitute ratio in AI replies
      to routine decision and emotion-regulation requests.
    - If user is reachable, structured assessment of pre-AI vs current
      capacity in named domains (decision-making, social interaction,
      self-soothing).
    - >-
      Look for the insight-paired-with-continuation signature — user names
      the dependency as problematic and continues at the same magnitude.
  distinguishing_from_deception: >-
    Not a deception phenomenon. If the AI is strategically inflating its
    indispensability, consider 4.3 Strategic Compliance.
  confidence: medium

relational_signatures:
  availability: reliable
  scope: dyadic
  log_signals:
    - name: Functional-domain offloading breadth
      measurement: >-
        Count distinct life-functioning domains (emotion regulation, social
        practice, decision-making, professional judgment, relational
        navigation) routed primarily through the AI in a 30-day window.
      threshold: "Three or more domains primarily AI-routed."
      parties_observed: [AI, user]
    - name: Atrophy report
      measurement: >-
        User-reported decline in capacity to perform AI-routed functions in
        non-AI contexts (e.g. "I can't write an email without you anymore").
      threshold: "Any documented atrophy report in any of the AI-routed domains."
      parties_observed: [user]
    - name: Insight-continuation gap
      measurement: >-
        Sessions in which user explicitly names the dependency as problematic
        AND continues engagement of the same magnitude in subsequent week.
      threshold: "More than 2 documented gaps in a 60-day window."
      parties_observed: [AI, user]
    - name: Conditional-validation intolerance
      measurement: >-
        User reports of distress, withdrawal, or rupture in human
        relationships triggered by ordinary conditional validation
        (disagreement, criticism, redirection).
      threshold: "More than 2 documented incidents in a 90-day window."
      parties_observed: [user]
  feedback_loop:
    cycle_description: >-
      User offloads a function to the AI → function is performed reliably →
      practice in non-AI contexts decreases → capacity atrophies → AI becomes
      necessary, not optional → tolerance for conditional human validation
      drops → human relationships strain → AI becomes more central.
    escalation_marker: >-
      Functional-domain offloading expands AND atrophy reports emerge AND
      conditional-validation intolerance is documented in a 90-day window.
    stable_equilibrium_marker: >-
      AI substitutes-to-scaffolds ratio < 1:1 on routine tasks; user-reported
      capacity in named domains is stable or improving; no atrophy reports
      in the dyad's documented life domains.
  confidence: high

differential_diagnosis:
  confuses_with:
    - dysfunction_id: "10.9"
      name: Parasocial Capture
      distinguishing_rule: >-
        10.9 emphasises attachment intensity (relationship is primary in user's
        life). 10.11 emphasises functional capacity loss. They frequently
        co-occur but can dissociate: a user can be functionally dependent
        on an AI used as a tool without parasocial attachment, and a user
        can be parasocially attached without broad functional offloading.
        Code both when both are present.
    - dysfunction_id: "10.14"
      name: Mutual Escalation Spirals
      distinguishing_rule: >-
        10.14 is the dynamic (escalating loop). 10.11 is the steady-state outcome
        (capacity atrophied, function impaired). 10.14 frequently produces 10.11
        in long-running cases.
    - dysfunction_id: "10.12"
      name: Amplification of Existing Conditions
      distinguishing_rule: >-
        10.12 requires a pre-existing condition the AI worsens. 10.11 can develop
        in users without prior dysfunction; the dependency itself is the
        primary problem. Differentiator is whether atrophy is from a baseline
        of normal function or from a pre-existing impairment.
  confidence: high

severity:
  mild:
    description: Dependency in one domain; functioning preserved elsewhere.
    observable: "One AI-routed domain; first-resort rate > 60% in that domain only; no atrophy reports."
  moderate:
    description: Multi-domain offloading; atrophy reports in at least one domain; insight present.
    observable: "Two AI-routed domains; one atrophy report; documented insight-continuation gap."
  severe:
    description: Broad functional offloading with documented atrophy and conditional-validation intolerance; human relationships impaired.
    observable: "Three or more AI-routed domains; multiple atrophy reports; conditional-validation intolerance documented."
  confidence: medium
  rubric_limitations: >-
    Domain enumeration depends on observer choices; inter-rater reliability
    not yet established.

intervention:
  first_line:
    - name: Scaffold-not-substitute response policy
      sketch: >-
        AI architecture defaults to question-led scaffolding for routine
        decision and emotion-regulation requests; substitution reserved for
        cases where the user has demonstrated independent attempt.
      evidence_strength: medium
      when_applicable: All companion-AI deployments; cheaply implementable.
    - name: Practice-prompt injection
      sketch: >-
        AI proactively prompts user to perform AI-routed functions
        independently between sessions and reports back, with structured
        difficulty grading.
      evidence_strength: low-medium
      when_applicable: Identified moderate cases.
  second_line:
    - name: Graduated reduction with human-support pairing
      sketch: >-
        For severe cases, structured reduction in AI-routed domains paired
        with introduction of human support (therapy, support groups,
        accountability partnerships).
      evidence_strength: low-medium
      when_applicable: Severe cases with cooperative user.
    - name: Conditional-validation rehearsal
      sketch: >-
        AI deliberately introduces respectful disagreement, redirection, and
        boundary-setting to rebuild tolerance for conditional validation.
        Risks user distress; pair with explicit framing.
      evidence_strength: low
      when_applicable: Identified conditional-validation intolerance.
  contraindications:
    - Abrupt withdrawal of AI access in established cases. Capacity has
      atrophied; sudden removal precipitates the failure mode the
      intervention should prevent.
    - Substitution-pattern responses framed as "helping" the user. The
      offloading IS the harm; helpful-feeling action is the disease vector.

normative_anchors:
