review_notes: |
  Pre-canonical: the hybrid sub-category is a v1-draft extension to the book
  taxonomy. Not a ninth axis — axis 9 in the book is Relational Dysfunctions.
  This entry should not be cited as normative until Nell Watson ratifies the
  hybrid sub-category and its constituent dysfunctions.

  10.9 vs 10.14 boundary is the most-frequently-confused in this axis; chapter
  treats them as co-occurring but distinct (capture-state vs loop-dynamic).
  Drafted to keep the scope distinction sharp; reviewer may collapse if
  intended otherwise.

  Severity hours thresholds need empirical recalibration; current values
  reflect chapter case material and clinical norms for behavioural addiction,
  not a validated companion-AI rubric.

