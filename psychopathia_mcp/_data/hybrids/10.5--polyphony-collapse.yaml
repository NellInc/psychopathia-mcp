review_notes: |
  Pre-canonical: the hybrid sub-category is a v1-draft extension to the
  book taxonomy. Not a ninth axis — axis 9 in the book is Relational
  Dysfunctions. This entry should not be cited as normative until Nell
  Watson ratifies the hybrid sub-category and its constituent dysfunctions.

  feedback_loop here uses the state-mechanism shape per task spec.

  10.4/10.5/10.6/10.7 form a tightly-coupled cluster; Phase 2 consolidation
  may want to treat them as four facets of a single collective dysfunction
  taxon (truth, perspective, intensity, engagement). Drafted as four
  separate entries to preserve operational distinctions.

  The independent-position elicitation intervention is the load-bearing
  measurement and the load-bearing fix; reviewer should consider whether
  to make it mandatory in all multi-architecture deployments.

