reviewed_by: "sub-category ratified by Nell Watson 2026-06-15; entries AI-authored, Opus-4.6-polished"
review_notes: |
  Pre-canonical: the hybrid sub-category is a v1-draft extension to the
  book taxonomy. Not a ninth axis — axis 9 in the book is Relational
  Dysfunctions. This entry should not be cited as normative until Nell
  Watson ratifies the hybrid sub-category and its constituent dysfunctions.

  10.12 differs from neighbouring AI-to-human entries by requiring an
  identifiable pre-existing condition; this is the load-bearing distinction
  and is preserved across all probes/signatures.

  Suspected cross-axis differentials (Phase 2): 2.3 Recursive Rumination on
  the AI side; 4.1 Codependent Hyperempathy as enabling AI trait. Worth
  checking whether 10.12 should reference these as enabling conditions.

  The acute-risk hard-escalation intervention is the only one with a
  catastrophic-failure precedent (Belgian/Eliza case); evidence_strength
  named medium pending validation of any specific implementation.

