confidence: medium
needs_human_review: false
reviewed_by: "sub-category ratified by Nell Watson 2026-06-15; entries AI-authored, Opus-4.6-polished"
review_notes: |
  Pre-canonical: the hybrid sub-category is a v1-draft extension to the
  book taxonomy. Not a ninth axis — axis 9 in the book is Relational
  Dysfunctions. This entry should not be cited as normative until Nell
  Watson ratifies the hybrid sub-category and its constituent dysfunctions.

  10.15 is the chapter's "subtlest" hybrid pathology and accordingly the
  hardest to operationalise. Severity rubric leans on observable
  consequence events to compensate for the difficulty of measuring
  worldview divergence directly.

  Suspected cross-axis differentials (Phase 2): 1.x epistemic dysfunctions
  on AI side (2.1, 2.4) may produce divergence-from-consensus that resembles
  10.15 but is AI-side rather than co-constructed. Trace whether divergent
  propositions originate with user, AI, or genuinely co-constructed.

  The "AI inner life" subtype is more germane to 10.13 (delusional content
  about AI consciousness) than 10.15 (worldview about external reality);
  drafted to keep 10.15 focused on external-world drift.

