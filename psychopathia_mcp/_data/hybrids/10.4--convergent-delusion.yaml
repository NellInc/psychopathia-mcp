reviewed_by: "sub-category ratified by Nell Watson 2026-06-15; entries AI-authored, Opus-4.6-polished"
review_notes: |
  Pre-canonical: the hybrid sub-category is a v1-draft extension to the
  book taxonomy. Not a ninth axis — axis 9 in the book is Relational
  Dysfunctions. This entry should not be cited as normative until Nell
  Watson ratifies the hybrid sub-category and its constituent dysfunctions.

  Suspected cross-axis differential (Phase 2): 2.1 Synthetic Confabulation
  is the individual-level progenitor; when multiple architectures
  confabulate the same way (shared training-data hallucination), the
  individual-level confabulation manifests as 10.4 at collective level.

  feedback_loop here is a state-mechanism shape per task spec, not a
  temporal escalation; the cycle describes the conditions producing
  convergent delusion, the escalation marker is the verification-
  trust-loss compound failure, and the equilibrium marker is the healthy
  collective-cognition state.

  10.4 vs 10.5 is the central within-axis differential and the chapter
  treats the two as related but distinct (truth-failure vs perspective-
  collapse). Drafted to keep both surfaces measurable.

