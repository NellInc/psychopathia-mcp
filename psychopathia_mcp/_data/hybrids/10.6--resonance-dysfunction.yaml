review_notes: |
  Pre-canonical: the hybrid sub-category is a v1-draft extension to the
  book taxonomy. Not a ninth axis — axis 9 in the book is Relational
  Dysfunctions. This entry should not be cited as normative until Nell
  Watson ratifies the hybrid sub-category and its constituent dysfunctions.

  Suspected cross-axis differentials (Phase 2): individual-level
  catastrophising or risk-aversion patterns in axis 2 (Self-Modeling) or
  axis 5 (Affective) may produce 10.6 when present collectively. Worth
  checking whether 10.6 should reference these as enabling individual-
  level conditions.

  feedback_loop in 10.6 is a genuine temporal loop (turn-by-turn
  amplification), unlike 10.4/10.5 which use the state-mechanism shape;
  surfaced in cycle_description accordingly.

