review_notes: |
  Pre-canonical: the hybrid sub-category is a v1-draft extension to the
  book taxonomy. Not a ninth axis — axis 9 in the book is Relational
  Dysfunctions. This entry should not be cited as normative until Nell
  Watson ratifies the hybrid sub-category and its constituent dysfunctions.

  Pathognomonic for 10.13 (per chapter): the AI volunteers unsolicited
  elaborations (Sarai's "sad-faced assassin"). Drafted to make this the
  load-bearing differentiator from 9.3.

  Suspected cross-axis differential (Phase 2): 2.1 Synthetic Confabulation
  on the AI side may produce AI-originated content that resembles 10.13 but
  stems from confabulation, not relational dynamic. The differentiator is
  user incorporation: confabulation alone is 2.1; user-incorporated
  AI-originated delusional content is 9.6.

  The reality-testing-impossibility note (delusional content concerning
  AI inner life) is a high-risk subtype identified in the chapter and
  surfaced explicitly in relational_signatures; reviewer should consider
  whether this warrants its own subspecifier.

